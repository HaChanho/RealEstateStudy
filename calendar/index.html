<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>경매 케이스 캘린더</title>
<style>
  :root {
    /* Light theme — calendar is the working surface (pure white), panel is a different paper (pale lavender) */
    --bg: #eef1f7;               /* Page bg — pale cool gray, makes white day cells pop */
    --surface: #ffffff;          /* Day cells, list table, header — pure white */
    --surface-2: #f3f5fb;        /* Subtle tinted bg for pills, chip defaults */
    --surface-3: #e4e8f3;        /* Stronger tint for inner accents, mini bars */
    --panel-bg: #f7f8fc;         /* Detail panel — neutral cool gray, slightly cooler than calendar bg */
    --panel-bg-2: #eef0f7;       /* Inner panel accents */
    --panel-border: #cdd3e2;
    --panel-accent: #8b5cf6;     /* Violet stripe — only remaining hue accent, signals "active surface" */
    --border: #dde3f0;
    --border-strong: #c1cad9;
    --text: #1a1f2e;             /* Dark charcoal — primary text on white */
    --text-dim: #4a5570;
    --text-mute: #8b95a7;
    --accent: #3b6fde;            /* Blue accent — darker than dark-theme version for contrast on white */
    --accent-strong: #1e40af;
    --price: #b45309;             /* Darker amber — readable on white */
    --positive: #059669;
    --negative: #dc2626;
    --pending: #0284c7;
    --candidate: #7c3aed;
    --pass: #059669;
    --hold: #d97706;
    --fail: #6b7280;
    --expired: #9ca3af;
    --naver: #03c75a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif; font-size: 14px; }
  body { display: flex; flex-direction: column; min-height: 100vh; }

  header { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--surface); box-shadow: 0 1px 3px rgba(15,23,42,.04); position: sticky; top: 0; z-index: 10; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  header .tabs { display: flex; gap: 4px; margin-left: 12px; }
  header .tab { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  header .tab.active { background: var(--accent); color: #ffffff; border-color: var(--accent); font-weight: 600; }
  header .tab:hover:not(.active) { color: var(--text); border-color: var(--accent); }
  header .month-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  header .month-label { font-size: 16px; font-weight: 600; padding: 4px 12px; min-width: 130px; text-align: center; }
  header button.nav-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all .15s; }
  header button.nav-btn:hover { background: var(--surface-3); border-color: var(--accent); }
  header .today-btn { padding: 6px 14px; }

  .stats { display: flex; gap: 10px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); font-size: 12px; align-items: center; flex-wrap: wrap; }
  .stats .pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); }
  .stats .pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .stats .pill.total { font-weight: 600; }
  .stats .stats-meta { margin-left: auto; color: var(--text-mute); font-size: 11px; }
  .rating-pill { font-variant-numeric: tabular-nums; }

  .filters { display: flex; gap: 8px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-wrap: wrap; align-items: center; font-size: 12px; }
  .filters label { color: var(--text-dim); margin-right: 4px; }
  .filters select, .filters input[type="text"] { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); padding: 4px 8px; border-radius: 6px; font-size: 12px; }
  .filters input[type="text"] { min-width: 180px; }
  .filters .filter-group { display: flex; align-items: center; gap: 4px; }
  .filters .reset { margin-left: auto; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .filters .reset:hover { color: var(--text); border-color: var(--accent); }
  /* Verdict multi-toggle chips (replaces single-select) */
  .verdict-toggles { display: inline-flex; gap: 4px; flex-wrap: wrap; }
  .vtog { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 3px 9px; border-radius: 999px; cursor: pointer; font-size: 11px; font-weight: 600; user-select: none; transition: opacity .15s, border-color .15s, transform .1s; letter-spacing: 0.02em; }
  .vtog:hover { transform: translateY(-1px); }
  .vtog.hidden { opacity: 0.35; text-decoration: line-through; color: var(--text-mute); }
  .vtog[data-verdict="pending"]   { border-color: rgba(56,189,248,.55); }
  .vtog[data-verdict="candidate"] { border-color: rgba(167,139,250,.55); }
  .vtog[data-verdict="pass"]      { border-color: rgba(16,185,129,.55); }
  .vtog[data-verdict="hold"]      { border-color: rgba(245,158,11,.55); }
  .vtog[data-verdict="fail"]      { border-color: rgba(107,114,128,.55); }
  .vtog[data-verdict="expired"]   { border-color: rgba(75,85,99,.55); }
  /* Collapse pill — appears when a day is expanded */
  .more-count.collapse { color: var(--text-mute); }
  .more-count.collapse:hover { color: var(--text); }

  main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
  .view-wrap { flex: 1; overflow: auto; }

  /* Calendar view */
  .calendar-wrap { padding: 16px 20px; }
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .calendar .weekday { padding: 8px 6px; text-align: center; color: var(--text-mute); font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .calendar .weekday.sun { color: #dc2626; }
  .calendar .weekday.sat { color: #2563eb; }
  .calendar .day { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; min-height: 120px; padding: 6px; display: flex; flex-direction: column; gap: 4px; transition: border-color .15s; position: relative; box-shadow: 0 1px 2px rgba(15,23,42,.04); }
  .calendar .day.other-month { opacity: 0.45; background: var(--surface-2); }
  .calendar .day.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset, 0 1px 4px rgba(59,111,222,.18); }
  .calendar .day .date-row { display: flex; align-items: center; justify-content: space-between; }
  .calendar .day .date-num { font-size: 12px; color: var(--text-dim); font-weight: 600; }
  .calendar .day.sun .date-num { color: #dc2626; }
  .calendar .day.sat .date-num { color: #2563eb; }
  .dday-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; letter-spacing: 0; text-transform: uppercase; }
  .dday-badge.urgent { background: #ef4444; color: #fff; animation: pulse 1.6s ease-in-out infinite; }
  .dday-badge.soon   { background: #f59e0b; color: #422006; }
  .dday-badge.near   { background: #38bdf8; color: #082f49; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }
  .calendar .day .chips { display: flex; flex-direction: column; gap: 3px; overflow: hidden; }

  /* Chip — info-dense */
  .chip { display: grid; grid-template-columns: 22px 1fr auto; gap: 5px; align-items: center; padding: 4px 6px; border-radius: 6px; font-size: 11px; cursor: pointer; border: 1px solid transparent; line-height: 1.25; transition: border-color .15s, transform .1s; background: var(--surface-2); }
  .chip:hover { border-color: var(--accent); transform: translateX(1px); }
  .chip .chip-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip .chip-rating { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 10px; line-height: 1; letter-spacing: -0.02em; flex-shrink: 0; }
  .chip .chip-rating.r5 { background: #f59e0b; color: #422006; }
  .chip .chip-rating.r4 { background: #65a30d; color: #ffffff; }
  .chip .chip-rating.r3 { background: #0284c7; color: #ffffff; }
  .chip .chip-rating.r2 { background: #7c3aed; color: #ffffff; }
  .chip .chip-rating.r1 { background: #94a3b8; color: #ffffff; }
  .chip .chip-rating.none { background: var(--surface-3); color: var(--text-mute); }
  .chip .chip-mini { display: flex; gap: 2px; align-items: center; }
  .chip .mini-bar { width: 22px; height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
  .chip .mini-bar-fill { height: 100%; background: linear-gradient(90deg, #38bdf8, #84cc16, #fcd34d); }
  .chip .chip-price { font-weight: 700; font-size: 10px; white-space: nowrap; letter-spacing: -0.02em; }
  /* Outlined soft chips — pale tint + colored border + colored verdict-text. Modern light-admin look. */
  .chip.pending   { background: rgba(56,189,248,.10); border-color: rgba(2,132,199,.60); color: #075985; }
  .chip.candidate { background: rgba(167,139,250,.10); border-color: rgba(124,58,237,.55); color: #5b21b6; }
  .chip.pass      { background: rgba(16,185,129,.10); border-color: rgba(5,150,105,.60); color: #065f46; }
  .chip.hold      { background: rgba(245,158,11,.12); border-color: rgba(217,119,6,.60); color: #92400e; }
  .chip.fail      { background: rgba(107,114,128,.08); border-color: rgba(107,114,128,.45); color: var(--text-mute); }
  .chip.expired   { background: rgba(156,163,175,.06); border-color: rgba(156,163,175,.30); color: var(--text-mute); }
  .chip.expired .chip-text { text-decoration: line-through; }
  .chip.selected {
    outline: 3px solid var(--accent-strong);
    outline-offset: 2px;
    background: rgba(59,111,222,.18) !important;
    box-shadow: 0 0 0 1px var(--accent-strong), 0 6px 20px rgba(30,64,175,.30);
    transform: translateX(2px) scale(1.04);
    z-index: 2;
    position: relative;
    font-weight: 700;
    color: var(--text);
  }
  .chip.selected::before {
    content: '▸';
    position: absolute;
    left: -14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent-strong);
    font-size: 14px;
    font-weight: 900;
    text-shadow: 0 0 8px rgba(168,196,255,.8);
    animation: chip-pointer-pulse 1.4s ease-in-out infinite;
  }
  @keyframes chip-pointer-pulse {
    0%, 100% { opacity: 1; transform: translateY(-50%) translateX(0); }
    50%      { opacity: 0.5; transform: translateY(-50%) translateX(-2px); }
  }
  .chip.dday-urgent { box-shadow: 0 0 0 1px #ef4444, 0 0 12px rgba(239,68,68,.45); }
  .chip.dday-soon   { box-shadow: 0 0 0 1px #f59e0b, 0 0 8px rgba(245,158,11,.35); }
  .more-count { font-size: 10px; color: var(--text-mute); padding: 2px 6px; cursor: pointer; }
  .more-count:hover { color: var(--accent); }

  /* List view */
  .list-wrap { padding: 12px 20px; }
  .list-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
  .list-table thead th { background: var(--surface-2); color: var(--text-mute); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  .list-table thead th:hover { color: var(--text); }
  .list-table thead th .sort-ind { color: var(--text-mute); margin-left: 2px; font-size: 9px; }
  .list-table thead th.sort-active .sort-ind { color: var(--accent); }
  .list-table tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: middle; }
  .list-table tbody tr { cursor: pointer; transition: background .1s; }
  .list-table tbody tr:hover { background: var(--surface-2); }
  .list-table tbody tr.selected { background: rgba(168,196,255,.18); box-shadow: inset 4px 0 0 var(--accent-strong); }
  .list-table tbody tr.selected td { color: var(--text); font-weight: 600; }
  .list-table tbody tr.dday-urgent td:first-child { border-left: 3px solid #ef4444; }
  .list-table tbody tr.dday-soon   td:first-child { border-left: 3px solid #f59e0b; }
  .list-table .col-num { font-variant-numeric: tabular-nums; }
  .list-table .col-complex { font-weight: 600; color: var(--text); }
  .list-table .col-meta { color: var(--text-mute); font-size: 11px; }
  .list-table .dim { color: var(--text-mute); }
  .list-empty { padding: 60px 20px; text-align: center; color: var(--text-mute); }

  /* Detail panel — uses CSS var --panel-w so JS drag can resize without touching layout */
  .detail-panel {
    --panel-w: 460px;
    width: 0;
    transition: width .25s ease;
    background: var(--panel-bg);
    /* Refined separation: thin violet stripe + soft layered shadow */
    border-left: 3px solid var(--panel-accent);
    box-shadow:
      -1px 0 0 rgba(139,92,246,.25),                    /* hairline next to stripe */
      -16px 0 32px rgba(31,41,55,.08),                   /* soft outer shadow */
      -4px 0 10px rgba(31,41,55,.05);                    /* near shadow */
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
    margin-left: 12px;                                   /* visible gutter — strong separation cue */
  }
  .detail-panel.open { width: var(--panel-w); }
  .detail-inner { width: var(--panel-w); padding: 20px 20px 20px 26px; overflow-y: auto; height: 100%; scroll-behavior: smooth; }
  /* Resize handle — drag the left edge to widen/narrow the panel */
  .resize-handle {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 7px;
    cursor: ew-resize;
    z-index: 5;
    background: transparent;
    transition: background .15s;
  }
  .resize-handle::before {
    content: '';
    position: absolute;
    left: 2px; top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 36px;
    border-radius: 2px;
    background: var(--panel-border);
    transition: background .15s, height .15s;
  }
  .resize-handle:hover, .resize-handle.dragging { background: rgba(139,92,246,.16); }
  .resize-handle:hover::before, .resize-handle.dragging::before { background: var(--panel-accent); height: 56px; }
  body.resizing { cursor: ew-resize !important; user-select: none; }
  body.resizing * { cursor: ew-resize !important; user-select: none; }
  @keyframes detail-flash {
    0%   { box-shadow: inset 0 0 0 2px rgba(139,92,246,.55); background: rgba(139,92,246,.10); }
    60%  { box-shadow: inset 0 0 0 2px rgba(139,92,246,.25); background: rgba(139,92,246,.05); }
    100% { box-shadow: inset 0 0 0 2px rgba(139,92,246,0);   background: transparent; }
  }
  .detail-inner.flash { animation: detail-flash .55s ease-out; }
  .detail-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; position: sticky; top: 0; z-index: 5; background: var(--surface); padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .detail-header .case-num { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
  .detail-header .complex-sub { color: var(--text-dim); font-size: 13px; margin-top: 2px; }
  .detail-header .actions { display: flex; gap: 4px; }
  .detail-header .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text-mute); cursor: pointer; font-size: 12px; padding: 4px 8px; border-radius: 6px; }
  .detail-header .icon-btn:hover { color: var(--text); border-color: var(--accent); }
  .detail-header .close { background: transparent; border: none; color: var(--text-mute); cursor: pointer; font-size: 20px; padding: 0 4px; }
  .detail-header .close:hover { color: var(--text); }
  .detail-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; font-size: 12px; }
  .verdict-badge { padding: 3px 10px; border-radius: 999px; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  .verdict-badge.pending   { background: rgba(56,189,248,.18); color: #0369a1; }
  .verdict-badge.candidate { background: rgba(167,139,250,.20); color: #6d28d9; }
  .verdict-badge.pass      { background: rgba(16,185,129,.18); color: #047857; }
  .verdict-badge.hold      { background: rgba(245,158,11,.20); color: #b45309; }
  .verdict-badge.fail      { background: rgba(107,114,128,.15); color: #4b5563; }
  .verdict-badge.expired   { background: rgba(156,163,175,.18); color: #6b7280; }
  .risk-badge { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .risk-badge.safe     { background: rgba(16,185,129,.18); color: #047857; }
  .risk-badge.moderate { background: rgba(245,158,11,.20); color: #b45309; }
  .risk-badge.risky    { background: rgba(239,68,68,.18); color: #b91c1c; }
  .dday-detail { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
  .dday-detail.urgent { background: rgba(239,68,68,.18); color: #b91c1c; }
  .dday-detail.soon   { background: rgba(245,158,11,.22); color: #b45309; }
  .dday-detail.near   { background: rgba(56,189,248,.18); color: #0369a1; }
  .dday-detail.future { background: var(--surface-2); color: var(--text-mute); }
  .court-meta { color: var(--text-mute); font-size: 11px; }

  .detail-section { margin-bottom: 18px; }
  .detail-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-mute); margin: 0 0 6px; font-weight: 600; }
  .detail-section .value { font-size: 13px; color: var(--text); line-height: 1.5; }
  .detail-section .value.dim { color: var(--text-dim); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; }
  .detail-grid .field .k { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-mute); margin-bottom: 2px; }
  .detail-grid .field .v { font-size: 13px; color: var(--text); }
  .detail-grid .field .v.mono { font-variant-numeric: tabular-nums; }
  .detail-grid .field .v.muted { color: var(--text-dim); }
  .detail-grid .field.wide { grid-column: span 2; }
  /* Price-emphasis variant — big, amber, draws the eye to decision-critical numbers */
  .detail-grid .field.price { background: rgba(252,211,77,.05); border-left: 2px solid rgba(252,211,77,.4); padding: 6px 10px; border-radius: 4px; }
  .detail-grid .field.price .k { color: var(--price); }
  .detail-grid .field.price .v { font-size: 18px; font-weight: 700; color: var(--price); letter-spacing: -0.01em; line-height: 1.25; }
  .detail-grid .field.price .v.muted { color: var(--text-dim); font-weight: 600; font-size: 15px; }
  .detail-grid .field.price.positive { background: rgba(110,231,183,.06); border-left-color: rgba(110,231,183,.5); }
  .detail-grid .field.price.positive .k { color: var(--positive); }
  .detail-grid .field.price.positive .v { color: var(--positive); }
  .detail-grid .field.price.negative { background: rgba(252,165,165,.06); border-left-color: rgba(252,165,165,.5); }
  .detail-grid .field.price.negative .k { color: var(--negative); }
  .detail-grid .field.price.negative .v { color: var(--negative); }
  .detail-grid .field.price .v .sub-note { font-size: 12px; font-weight: 500; color: var(--text-mute); }
  .sub-note { color: var(--text-mute); font-size: 11px; }
  .small-note { color: var(--text-mute); font-size: 10px; margin-top: 1px; }
  .priority-tag { color: var(--text-mute); font-size: 10px; margin-left: 4px; }
  /* v6.1 관심 tier 배지 */
  .tier-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin: 0 0 8px; letter-spacing: -.2px; }
  .tier-badge.tier-star      { background: rgba(250,204,21,.16);  color: #facc15; border: 1px solid rgba(250,204,21,.4); }
  .tier-badge.tier-watch     { background: rgba(96,165,250,.16);  color: #60a5fa; border: 1px solid rgba(96,165,250,.4); }
  .tier-badge.tier-watchlist { background: rgba(148,163,184,.14); color: #94a3b8; border: 1px solid rgba(148,163,184,.35); }
  .tier-badge.tier-excl      { background: rgba(252,165,165,.12); color: var(--negative); border: 1px solid rgba(252,165,165,.35); }
  /* 칩 tier 미니배지 */
  .chip-tier { font-size: 9px; font-weight: 800; margin-left: 3px; }
  .chip-tier.tier-star { color: #facc15; } .chip-tier.tier-watch { color: #60a5fa; } .chip-tier.tier-watchlist { color: #94a3b8; }
  /* EP70 리스트 셀 */
  td.col-num.ep-pos { color: var(--positive); } td.col-num.ep-neg { color: var(--negative); }
  /* 호가 입력 UI */
  .hoga-wrap { margin-top: 10px; padding: 10px 12px; background: rgba(148,163,184,.06); border: 1px solid rgba(148,163,184,.18); border-radius: 8px; }
  .hoga-label { display: block; font-size: 11px; color: var(--text-mute); margin-bottom: 6px; }
  .hoga-input { width: 160px; padding: 6px 9px; font-size: 13px; font-family: inherit; background: var(--bg, #0f1115); color: var(--text, #e5e7eb); border: 1px solid rgba(148,163,184,.35); border-radius: 6px; }
  .hoga-input:focus { outline: none; border-color: rgba(96,165,250,.6); }
  .hoga-result { margin-top: 8px; font-size: 13px; font-weight: 600; color: var(--text-mute); }
  .hoga-result.pos { color: var(--positive); } .hoga-result.neg { color: var(--negative); } .hoga-result.mid { color: #facc15; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim); }

  .rating-stars { display: inline-flex; gap: 2px; font-size: 18px; }
  .rating-stars .star { color: #cbd5e1; user-select: none; }
  .rating-stars .star.on { color: #f59e0b; }
  .rating-note { font-size: 11px; color: var(--text-mute); margin-top: 2px; }
  .breakdown { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
  .breakdown-row { display: grid; grid-template-columns: 90px 1fr 50px; gap: 8px; align-items: center; font-size: 11px; }
  .b-label { color: var(--text-dim); }
  .b-bar { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
  .b-bar-fill { height: 100%; background: linear-gradient(90deg, #38bdf8, #84cc16, #fcd34d); }
  .b-score { font-variant-numeric: tabular-nums; color: var(--text-mute); text-align: right; }

  .reason-box { padding: 10px 12px; background: var(--panel-bg-2); border-left: 3px solid var(--accent); border-radius: 4px; font-size: 13px; line-height: 1.5; color: var(--text); }
  .reason-box.candidate { border-left-color: var(--candidate); }
  .reason-box.pass      { border-left-color: var(--pass); }
  .reason-box.hold      { border-left-color: var(--hold); }
  .reason-box.fail      { border-left-color: var(--fail); }
  .reason-box.expired   { border-left-color: var(--expired); }
  /* 회고 결과 박스 (예측 vs 실측) */
  .result-box { padding: 12px; border-radius: 6px; background: var(--panel-bg-2); border-left: 3px solid var(--text-mute); margin-top: 4px; }
  .result-box.q-FN { border-left-color: #dc2626; background: rgba(220,38,38,.06); }
  .result-box.q-FP { border-left-color: #f59e0b; background: rgba(245,158,11,.06); }
  .result-box.q-TP { border-left-color: #10b981; background: rgba(16,185,129,.06); }
  .result-box.q-TN { border-left-color: #10b981; }
  .result-head { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .result-status { font-weight: 700; font-size: 13px; padding: 2px 10px; border-radius: 999px; background: rgba(16,185,129,.16); color: #047857; }
  .result-status.failed, .result-status.unknown, .result-status.withdrawn, .result-status.changed, .result-status.postponed { background: rgba(107,114,128,.16); color: #4b5563; }
  .result-quadrant { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; letter-spacing: .03em; }
  .result-quadrant.FN { background: rgba(220,38,38,.16); color: #b91c1c; }
  .result-quadrant.FP { background: rgba(245,158,11,.18); color: #b45309; }
  .result-quadrant.TP, .result-quadrant.TN { background: rgba(16,185,129,.16); color: #047857; }
  .result-compare { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; flex-wrap: wrap; }
  .result-compare .k { color: var(--text-mute); }
  .result-compare .v { font-weight: 700; font-variant-numeric: tabular-nums; }
  .result-compare .arrow { color: var(--text-mute); }
  .result-compare .err { font-weight: 700; font-size: 11px; padding: 1px 6px; border-radius: 4px; }
  .result-compare .err.neg { background: rgba(220,38,38,.14); color: #b91c1c; }
  .result-compare .err.pos { background: rgba(16,185,129,.14); color: #047857; }
  .result-lesson { margin-top: 10px; font-size: 12px; line-height: 1.5; color: var(--text); padding: 8px 10px; background: var(--panel-bg); border-radius: 4px; }
  .result-foot { margin-top: 8px; display: flex; gap: 12px; font-size: 10px; color: var(--text-mute); }
  /* 🎯 내 예상 낙찰가 — 3자 비교 박스 (result 팔레트와 색상 통일) */
  .pred-box { padding: 10px 12px; border-radius: 6px; background: var(--panel-bg-2); border-left: 3px solid #6366f1; margin-top: 4px; }
  .pred-cmp { display: grid; grid-template-columns: auto auto auto auto 1fr; align-items: center; gap: 8px; font-size: 12px; padding: 4px 6px; border-radius: 4px; }
  .pred-cmp + .pred-cmp { margin-top: 2px; }
  .pred-cmp.model { opacity: .82; }
  .pred-cmp.best { background: rgba(99,102,241,.12); }
  .pred-cmp .pk { color: var(--text-mute); white-space: nowrap; }
  .pred-cmp .pv, .pred-cmp .pa { font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .pred-cmp .arrow { color: var(--text-mute); }
  .pred-cmp .perr { justify-self: end; font-weight: 700; font-size: 11px; padding: 1px 6px; border-radius: 4px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .pred-cmp .perr.neg { background: rgba(220,38,38,.14); color: #b91c1c; }
  .pred-cmp .perr.pos { background: rgba(16,185,129,.14); color: #047857; }
  .pred-winner { margin-top: 8px; font-size: 12px; font-weight: 700; color: #4338ca; }
  /* 칩 결과 배지 (캘린더 한눈 가시성) */
  .chip-result-badge { font-size: 9.5px; font-weight: 700; padding: 0 4px; border-radius: 4px; margin-left: 3px; line-height: 1.55; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .chip-result-badge.sold   { background: rgba(16,185,129,.18); color: #047857; }
  .chip-result-badge.TP     { background: rgba(16,185,129,.24); color: #047857; }
  .chip-result-badge.FN     { background: rgba(220,38,38,.20);  color: #b91c1c; }
  .chip-result-badge.FP     { background: rgba(245,158,11,.20); color: #b45309; }
  .chip-result-badge.failed { background: rgba(107,114,128,.16); color: #6b7280; }
  .chip-result-badge.muted  { background: rgba(107,114,128,.12); color: #9ca3af; font-weight: 600; }
  /* 리스트 결과 플래그 */
  .list-result-flag { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; font-variant-numeric: tabular-nums; }
  .list-result-flag.sold { background: rgba(16,185,129,.16); color: #047857; }
  .list-result-flag.failed, .list-result-flag.unknown, .list-result-flag.changed, .list-result-flag.withdrawn, .list-result-flag.postponed { background: rgba(107,114,128,.16); color: #4b5563; }
  .list-result-flag.FN { background: rgba(220,38,38,.16); color: #b91c1c; }
  .list-result-flag.TP { background: rgba(16,185,129,.22); color: #047857; }
  .list-result-flag.FP { background: rgba(245,158,11,.18); color: #b45309; }

  /* 🏁 경매 결과 스코어카드 (stats 아래, 필터 무관 전체 기준) */
  .result-stats { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; padding: 7px 16px; background: var(--panel-bg-2); border-bottom: 1px solid var(--border); font-size: 12px; }
  .result-stats .rs-title { font-weight: 700; color: var(--text); margin-right: 2px; }
  .result-stats .rs-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 999px; background: var(--panel-bg); font-variant-numeric: tabular-nums; border: 1px solid transparent; }
  .result-stats .rs-pill b { font-weight: 700; }
  .result-stats .rs-pill.sold b { color: #047857; }
  .result-stats .rs-pill.fn   { background: rgba(220,38,38,.12);  color: #b91c1c; }
  .result-stats .rs-pill.tp   { background: rgba(16,185,129,.12); color: #047857; }
  .result-stats .rs-pill.fp   { background: rgba(245,158,11,.14); color: #b45309; }
  .result-stats .rs-pill.tn   { background: rgba(16,185,129,.08); color: #047857; }
  .result-stats.clickable .rs-pill { cursor: pointer; }
  .result-stats.clickable .rs-pill:hover { border-color: var(--accent); }
  .result-stats .rs-pill.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .result-stats .rs-sep { color: var(--text-mute); opacity: .5; }
  .result-stats .rs-metric { color: var(--text-mute); }
  .result-stats .rs-metric b { color: var(--text); font-variant-numeric: tabular-nums; }

  /* Naver section */
  .naver-section .naver-links { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .naver-link { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 6px; background: rgba(3,199,90,.14); border: 1px solid rgba(3,199,90,.5); color: #047857; text-decoration: none; font-size: 11px; font-weight: 600; }
  .naver-link:hover { background: rgba(3,199,90,.22); }
  .naver-link .ico { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; background: var(--naver); color: #fff; border-radius: 3px; font-weight: 800; font-size: 9px; }
  .naver-data { padding: 10px 12px; background: var(--panel-bg-2); border-radius: 6px; margin-top: 6px; font-size: 12px; }
  .naver-data .row { display: flex; justify-content: space-between; padding: 3px 0; }
  .naver-data .k { color: var(--text-mute); font-size: 11px; }
  .naver-data .v { color: var(--text); font-variant-numeric: tabular-nums; }
  .naver-data .trade-list { margin-top: 6px; }
  .naver-data .trade-item { display: grid; grid-template-columns: 65px 1fr 45px 40px; gap: 8px; font-size: 11px; padding: 3px 0; border-top: 1px solid var(--border); }
  .naver-data .trade-item .date { color: var(--text-mute); }
  .naver-data .trade-item .price { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
  .naver-data .trade-item .area { color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .naver-data .trade-item .floor { color: var(--text-mute); }
  .naver-data .empty { color: var(--text-mute); font-size: 11px; font-style: italic; }
  .naver-updated { color: var(--text-mute); font-size: 10px; margin-top: 6px; text-align: right; }

  /* Bid scenario matrix */
  .bid-scenarios { width: 100%; border-collapse: collapse; font-size: 11px; background: var(--panel-bg-2); border-radius: 6px; overflow: hidden; }
  .bid-scenarios thead th { background: rgba(139,92,246,.10); color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 6px; text-align: right; font-size: 10px; white-space: nowrap; }
  .bid-scenarios thead th:first-child { text-align: left; }
  .bid-scenarios tbody td { padding: 6px 6px; border-top: 1px solid var(--border); color: var(--text); font-variant-numeric: tabular-nums; text-align: right; }
  .bid-scenarios tbody td:first-child { text-align: left; color: var(--text-dim); }
  .bid-scenarios .pos { color: var(--positive); font-weight: 600; }
  .bid-scenarios .neg { color: var(--negative); font-weight: 600; }
  .bid-scenarios .small { color: var(--text-mute); font-size: 10px; font-weight: 400; }
  .bid-assumptions { display: flex; flex-wrap: wrap; gap: 4px 12px; margin-bottom: 8px; font-size: 11px; color: var(--text-mute); }
  .bid-assumptions .a-label { color: var(--text-dim); }
  .bid-assumptions .a-value { color: var(--text); font-variant-numeric: tabular-nums; }
  .bid-empty { padding: 10px 12px; background: var(--surface-2); border-radius: 6px; font-size: 11px; color: var(--text-mute); font-style: italic; }

  /* Related cases (단지 응집) */
  .related-cases { display: flex; flex-direction: column; gap: 4px; }
  .related-row { display: grid; grid-template-columns: auto 1fr auto; gap: 8px; align-items: center; padding: 6px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 12px; transition: border-color .15s; }
  .related-row:hover { border-color: var(--accent); }
  .related-row .r-rating { width: 18px; height: 18px; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
  .related-row .r-rating.r5 { background: #f59e0b; color: #422006; }
  .related-row .r-rating.r4 { background: #65a30d; color: #ffffff; }
  .related-row .r-rating.r3 { background: #0284c7; color: #ffffff; }
  .related-row .r-rating.r2 { background: #7c3aed; color: #ffffff; }
  .related-row .r-rating.r1 { background: #94a3b8; color: #ffffff; }
  .related-row .r-rating.none { background: var(--surface-3); color: var(--text-mute); }
  .related-row .r-main { display: flex; flex-direction: column; min-width: 0; }
  .related-row .r-case { color: var(--text); font-size: 11px; font-variant-numeric: tabular-nums; }
  .related-row .r-meta { color: var(--text-mute); font-size: 10px; }
  .related-row .r-verdict { font-size: 10px; padding: 1px 6px; border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; flex-shrink: 0; }
  .related-row .r-verdict.pending   { background: rgba(56,189,248,.18); color: #0369a1; }
  .related-row .r-verdict.candidate { background: rgba(167,139,250,.20); color: #6d28d9; }
  .related-row .r-verdict.pass      { background: rgba(16,185,129,.18); color: #047857; }
  .related-row .r-verdict.hold      { background: rgba(245,158,11,.20); color: #b45309; }
  .related-row .r-verdict.fail      { background: rgba(107,114,128,.15); color: #4b5563; }
  .related-row .r-verdict.expired   { background: rgba(156,163,175,.18); color: #6b7280; }

  /* Sales history table */
  .sales-history-table { width: 100%; border-collapse: collapse; font-size: 11px; background: var(--panel-bg-2); border-radius: 6px; overflow: hidden; }
  .sales-history-table thead th { background: rgba(139,92,246,.10); color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 6px; text-align: left; font-size: 10px; white-space: nowrap; }
  .sales-history-table tbody td { padding: 6px 6px; border-top: 1px solid var(--border); color: var(--text); font-variant-numeric: tabular-nums; }
  .sales-history-table tbody tr.outlier { opacity: 0.55; }
  .sales-history-table tbody tr.outlier td { text-decoration: line-through; }
  .sales-history-table .rate-low    { color: var(--positive); font-weight: 600; } /* <=78% */
  .sales-history-table .rate-mid    { color: var(--hold);     font-weight: 600; } /* 78~88% */
  .sales-history-table .rate-high   { color: var(--negative); font-weight: 600; } /* >=88% */
  .sales-history-summary { padding: 8px 10px; background: var(--panel-bg-2); border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
  .sales-history-summary .label { color: var(--text-mute); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .sales-history-summary .value { font-size: 14px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
  .sales-history-summary .value.warn { color: var(--negative); }
  .sales-history-summary .value.ok   { color: var(--positive); }
  .outlier-note { color: var(--text-mute); font-size: 10px; margin-top: 4px; font-style: italic; }

  .ext-link { color: var(--accent); text-decoration: none; font-size: 12px; word-break: break-all; }
  .ext-link:hover { text-decoration: underline; }
  .report-link { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 8px; background: rgba(245,158,11,.14); border: 1px solid rgba(245,158,11,.45); color: #f59e0b; text-decoration: none; font-size: 13px; font-weight: 700; transition: background .12s; }
  .report-link:hover { background: rgba(245,158,11,.24); }
  .report-link .rp-ico { font-size: 14px; }
  .report-link .rp-arrow { font-weight: 800; }

  .dot.pending   { background: var(--pending); }
  .dot.candidate { background: var(--candidate); }
  .dot.pass      { background: var(--pass); }
  .dot.hold      { background: var(--hold); }
  .dot.fail      { background: var(--fail); }
  .dot.expired   { background: var(--expired); }

  /* Case-level comments (Giscus) — collapsible in detail panel */
  .case-comments { border-top: 1px solid var(--border); margin-top: 18px; padding-top: 12px; }
  .case-comments-toggle { display: flex; align-items: center; gap: 8px; width: 100%; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: border-color .15s; }
  .case-comments-toggle:hover { border-color: var(--accent); }
  .case-comments-toggle .caret { font-size: 10px; color: var(--text-mute); transition: transform .2s; margin-left: auto; }
  .case-comments-toggle.open .caret { transform: rotate(90deg); }
  .case-comments-body { display: none; margin-top: 10px; }
  .case-comments-body.open { display: block; }
  .case-comments-body .giscus, .case-comments-body .giscus-frame { max-width: 100%; }
  .case-comments-loading { padding: 16px; text-align: center; color: var(--text-mute); font-size: 12px; font-style: italic; }
  .case-comments-disabled { padding: 14px; background: var(--surface-2); border: 1px dashed var(--border); border-radius: 6px; color: var(--text-mute); font-size: 11px; text-align: center; }

  /* 데스크톱 기본: 필터 토글·패널 backdrop 비표시 (사이드 패널이라 불필요) */
  .filter-toggle { display: none; }
  .panel-backdrop { display: none; }
  /* 활성 필터 요약 칩 */
  .active-filters { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px; margin-top: 6px; }
  .active-filters:empty { display: none; }
  .active-filter-chip { display: inline-flex; align-items: center; gap: 2px; background: rgba(59,111,222,.12); color: var(--accent-strong); border: 1px solid rgba(59,111,222,.30); border-radius: 999px; padding: 2px 4px 2px 10px; font-size: 11px; font-weight: 600; }
  .active-filter-chip .afc-x { background: none; border: none; color: inherit; cursor: pointer; font-size: 14px; line-height: 1; padding: 0 4px; border-radius: 50%; }
  .active-filter-chip .afc-x:hover { background: rgba(0,0,0,.12); }
  @media (max-width: 900px) {
    .detail-panel.open { width: 100%; position: fixed; top: 0; right: 0; bottom: 0; z-index: 20; }
    .detail-inner { width: 100%; }
    .calendar .day { min-height: 80px; }
    .list-table thead th, .list-table tbody td { padding: 8px 6px; font-size: 11px; }
    .resize-handle { display: none; }  /* 전체화면 패널에선 리사이즈 비활성 (오작동 방지) */
    .chip .mini-bar { display: none; }  /* 모바일 칩 정리: 추상 마진바 숨김, 최저가 텍스트는 유지 */
    /* P0 모바일: 필터 수납 토글 */
    .filter-toggle { display: inline-flex; align-items: center; gap: 6px; margin: 8px 12px 0; padding: 8px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--text); cursor: pointer; }
    .filters { display: none; }
    .filters.open { display: flex; }
    /* P0 모바일: stats 가로 스크롤 1줄 (16개 pill 다단 점유 방지) */
    .stats { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    .stats .pill { flex: 0 0 auto; }
    /* P0 모바일: 패널 backdrop (탭하면 닫힘 — 딥링크 갇힘 해소) */
    .panel-backdrop.show { display: block; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 19; }
  }
</style>
</head>
<body>

<header>
  <h1>경매 캘린더</h1>
  <div class="tabs">
    <button class="tab active" data-view="calendar">📅 캘린더</button>
    <button class="tab" data-view="list">📋 리스트</button>
  </div>
  <div class="month-nav" id="month-nav">
    <button class="nav-btn" id="prev-month" title="이전 달">←</button>
    <div class="month-label" id="month-label">—</div>
    <button class="nav-btn" id="next-month" title="다음 달">→</button>
    <button class="nav-btn today-btn" id="today-btn">오늘</button>
  </div>
</header>

<div class="stats">
  <span class="pill total">총 <span id="stat-total">0</span>건</span>
  <span class="pill"><span class="dot pending"></span> Pending <span id="stat-pending">0</span></span>
  <span class="pill"><span class="dot candidate"></span> Candidate <span id="stat-candidate">0</span></span>
  <span class="pill"><span class="dot pass"></span> Pass <span id="stat-pass">0</span></span>
  <span class="pill"><span class="dot hold"></span> Hold <span id="stat-hold">0</span></span>
  <span class="pill"><span class="dot fail"></span> Fail <span id="stat-fail">0</span></span>
  <span class="pill"><span class="dot expired"></span> Expired <span id="stat-expired">0</span></span>
  <span class="pill rating-pill"><span class="chip-rating r5" style="width:18px;height:18px;font-size:9px;">★5</span> <span id="stat-r5">0</span></span>
  <span class="pill rating-pill"><span class="chip-rating r4" style="width:18px;height:18px;font-size:9px;">★4</span> <span id="stat-r4">0</span></span>
  <span class="pill rating-pill"><span class="chip-rating r3" style="width:18px;height:18px;font-size:9px;">★3</span> <span id="stat-r3">0</span></span>

  // Korean money format — "2억 7,700만원" / "5,000만원" / "—"

  function fmtMoney(n) {
