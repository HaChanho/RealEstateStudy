  function renderCalendar() {
    const { y, m } = state.currentMonth;
    document.getElementById('month-label').textContent = `${y}년 ${m + 1}월`;
    const firstDay = new Date(y, m, 1);
    const lastDay = new Date(y, m + 1, 0);
    const startWeekday = firstDay.getDay();
    const daysInMonth = lastDay.getDate();
    const prevMonthLast = new Date(y, m, 0).getDate();
    const totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;

    const cal = document.getElementById('calendar');
    cal.replaceChildren();

    const weekdays = ['일','월','화','수','목','금','토'];
    weekdays.forEach((w, i) => {
      cal.appendChild(el('div', { cls: 'weekday' + (i === 0 ? ' sun' : i === 6 ? ' sat' : ''), text: w }));
    });

    const byDate = new Map();
    for (const c of getFiltered()) {
      if (!c.saleDate) continue;
      if (!byDate.has(c.saleDate)) byDate.set(c.saleDate, []);
      byDate.get(c.saleDate).push(c);
    }

    for (let i = 0; i < totalCells; i++) {
      const dayCell = el('div', { cls: 'day' });
      const weekdayIdx = i % 7;
      if (weekdayIdx === 0) dayCell.classList.add('sun');
      if (weekdayIdx === 6) dayCell.classList.add('sat');

      let dateObj;
      if (i < startWeekday) { dateObj = new Date(y, m - 1, prevMonthLast - (startWeekday - 1 - i)); dayCell.classList.add('other-month'); }
      else if (i >= startWeekday + daysInMonth) { dateObj = new Date(y, m + 1, i - startWeekday - daysInMonth + 1); dayCell.classList.add('other-month'); }
      else { dateObj = new Date(y, m, i - startWeekday + 1); }

      const dateStr = `${dateObj.getFullYear()}-${String(dateObj.getMonth()+1).padStart(2,'0')}-${String(dateObj.getDate()).padStart(2,'0')}`;
      if (dateStr === todayStr) dayCell.classList.add('today');

      const dateRow = el('div', { cls: 'date-row' });
      dateRow.appendChild(el('div', { cls: 'date-num', text: String(dateObj.getDate()) }));
      const days = daysUntil(dateStr);
      const dCls = ddayClass(days);
      if (dCls) dateRow.appendChild(el('span', { cls: 'dday-badge ' + dCls, text: ddayLabel(days) }));
      dayCell.appendChild(dateRow);

      const chipsWrap = el('div', { cls: 'chips' });
      const cases = byDate.get(dateStr) || [];
      const MAX_VISIBLE = 4;
      function appendChip(c) {
        const r = effectiveRating(c);
        const cls = ['chip', c.verdict];
        if (dCls === 'urgent' && c.verdict !== 'expired') cls.push('dday-urgent');
        else if (dCls === 'soon' && c.verdict !== 'expired') cls.push('dday-soon');
        const chip = el('div', { cls: cls.join(' '), title: `${c.caseNumber} · ${c.complex}${r != null ? ' · ★' + r : ''}${c.minimumPrice != null ? ' · 최저 ' + fmtMoneyShort(c.minimumPrice) : ''}` });
        if (c.id === state.selectedId) chip.classList.add('selected');
        // Rating dot
        const rd = el('span', { cls: 'chip-rating ' + (r != null ? 'r' + r : 'none'), text: r != null ? r + '' : '·' });
        chip.appendChild(rd);
        // Label
        chip.appendChild(el('span', { cls: 'chip-text', text: chipLabel(c) }));
        // v6.1 관심 tier 미니배지(★/◇/▷) + 회고 결과 배지를 하나의 trailing 그룹으로 묶는다.
        // 3컬럼 grid(22px 1fr auto)는 trailing 셀이 1개일 때만 안정적이다. tier·result가
        // 동시에 존재(예: ▷watchlist 물건이 매각 당일 결과까지 도래)하면 각각 별도 grid 셀이 되어
        // result배지가 2행 22px 컬럼으로 밀려 가격과 겹친다. 둘을 한 셀(.chip-trail)에 수용해 방지.
        const trail = el('span', { cls: 'chip-trail' });
        { const _tm = { primary: '★', watch: '◇', watchlist: '▷' }; if (c.interestTier && _tm[c.interestTier]) trail.appendChild(el('span', { cls: 'chip-tier tier-' + (c.interestTier === 'primary' ? 'star' : c.interestTier === 'watch' ? 'watch' : 'watchlist'), text: _tm[c.interestTier] })); }
        { const _b = resultChipBadge(resultFor(c)); if (_b) trail.appendChild(_b); }
        if (trail.childNodes.length) chip.appendChild(trail);
        // Mini: 최저가(매매사업자 핵심 지표) + margin bar
        const mini = el('span', { cls: 'chip-mini' });
        if (c.minimumPrice != null) mini.appendChild(el('span', { cls: 'chip-price', text: fmtMoneyShort(c.minimumPrice) }));
        const margin = (c.kbPrice && c.minimumPrice) ? c.kbPrice - c.minimumPrice : null;
        if (margin != null) {
          const bar = el('span', { cls: 'mini-bar' });
          const pct = Math.max(0, Math.min(1, margin / (c.kbPrice * 0.4)));
          const fill = el('span', { cls: 'mini-bar-fill' });
          fill.style.width = (pct * 100).toFixed(0) + '%';
          if (margin < 0) fill.style.background = '#ef4444';
          bar.appendChild(fill);
          bar.title = `미시 마진 ${fmtMoneySigned(margin)}`;
          mini.appendChild(bar);
        }
        chip.appendChild(mini);
        chip.addEventListener('click', (e) => { e.stopPropagation(); openDetail(c.id); });
        chipsWrap.appendChild(chip);
      }
      const isExpanded = state.expandedDates.has(dateStr);
      const visibleCount = isExpanded ? cases.length : MAX_VISIBLE;
      cases.slice(0, visibleCount).forEach(appendChip);
      if (cases.length > MAX_VISIBLE && !isExpanded) {
        const more = el('div', { cls: 'more-count', text: `+${cases.length - MAX_VISIBLE}건` });
        more.addEventListener('click', (e) => {
          e.stopPropagation();
          state.expandedDates.add(dateStr);
          renderCalendar();
        });
        chipsWrap.appendChild(more);
      } else if (isExpanded && cases.length > MAX_VISIBLE) {
        const less = el('div', { cls: 'more-count collapse', text: '− 접기' });
        less.addEventListener('click', (e) => {
          e.stopPropagation();
          state.expandedDates.delete(dateStr);
          renderCalendar();
        });
        chipsWrap.appendChild(less);
      }
      dayCell.appendChild(chipsWrap);
      cal.appendChild(dayCell);
    }
  }

  // ===== List view =====
  const LIST_COLUMNS = [
    { key: 'rating',     label: '별점',    width: '50px',  align: 'center' },
    { key: 'verdict',    label: '판정',    width: '80px' },
    { key: 'saleDate',   label: '매각일',  width: '100px' },
    { key: 'caseNumber', label: '사건',    width: '140px' },
    { key: 'complex',    label: '단지',    width: 'auto' },
    { key: 'region',     label: '지역',    width: '80px' },
    { key: 'areaSqm',    label: '전용',    width: '60px',  align: 'right' },
    { key: 'minimumPrice', label: '최저가', width: '110px',  align: 'right' },
    { key: 'kbPrice',    label: 'KB시세',  width: '105px',  align: 'right' },
    { key: 'neutralSalePrice', label: '보수매도', width: '110px', align: 'right' },
    { key: 'bid70',      label: '입찰권장(70%)', width: '115px', align: 'right' },
    { key: 'expectedProfit70', label: '예상수익', width: '100px', align: 'right' },
    { key: 'saleRate',   label: '매각가율', width: '70px', align: 'right' },
    { key: 'rounds',     label: '유찰',    width: '50px', align: 'center' },
  ];

  function sortValue(c, key) {
    switch (key) {
      case 'rating': return effectiveRating(c) ?? -1;
      case 'margin': return (c.kbPrice && c.minimumPrice) ? c.kbPrice - c.minimumPrice : Number.NEGATIVE_INFINITY;
      case 'saleRate': return c.saleRate ?? 99; // 미확인은 뒤로
      case 'expectedProfit70': return c.expectedProfit70 ?? Number.NEGATIVE_INFINITY; // 미산출은 뒤로
      case 'bid70': return c.bid70 ?? Number.NEGATIVE_INFINITY;
      case 'neutralSalePrice': return c.neutralSalePrice ?? Number.NEGATIVE_INFINITY;
      default: return c[key];
    }
  }

  function renderList() {
    const head = document.getElementById('list-head');
    head.replaceChildren();
    for (const col of LIST_COLUMNS) {
      const th = el('th', { text: col.label });
      th.style.width = col.width;
      if (col.align) th.style.textAlign = col.align;
      if (state.sort.key === col.key) th.classList.add('sort-active');
      th.appendChild(el('span', { cls: 'sort-ind', text: state.sort.key === col.key ? (state.sort.dir === 'asc' ? ' ▲' : ' ▼') : ' ↕' }));
      th.addEventListener('click', () => {
        if (state.sort.key === col.key) state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
        else { state.sort.key = col.key; state.sort.dir = (col.key === 'rating' || col.key === 'margin' || col.key === 'rounds') ? 'desc' : 'asc'; }
        renderList();
      });
      head.appendChild(th);
    }

    const body = document.getElementById('list-body');
    body.replaceChildren();
    const filtered = getFiltered();
    const sorted = filtered.slice().sort((a, b) => {
      const av = sortValue(a, state.sort.key);
      const bv = sortValue(b, state.sort.key);
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      let cmp;
      if (typeof av === 'number' && typeof bv === 'number') cmp = av - bv;
      else cmp = String(av).localeCompare(String(bv), 'ko');
      return state.sort.dir === 'asc' ? cmp : -cmp;
    });

    document.getElementById('list-empty').hidden = sorted.length > 0;

    for (const c of sorted) {
      const tr = el('tr');
      if (c.id === state.selectedId) tr.classList.add('selected');
      const days = daysUntil(c.saleDate);
      const dCls = ddayClass(days);
      if (dCls === 'urgent' && c.verdict !== 'expired') tr.classList.add('dday-urgent');
      else if (dCls === 'soon' && c.verdict !== 'expired') tr.classList.add('dday-soon');
      tr.addEventListener('click', () => openDetail(c.id));

      // rating
      {
        const td = el('td');
        td.style.textAlign = 'center';
        const r = effectiveRating(c);
        const dot = el('span', { cls: 'chip-rating ' + (r != null ? 'r' + r : 'none'), text: r != null ? r + '' : '·' });
        dot.style.display = 'inline-flex';
        td.appendChild(dot);
        tr.appendChild(td);
      }
      // verdict
      {
        const td = el('td');
        td.appendChild(el('span', { cls: 'verdict-badge ' + c.verdict, text: c.verdict }));
        const _ar = resultFor(c);
        if (_ar) {
          const SMAP = { sold: '낙찰', failed: '유찰', changed: '변경', withdrawn: '취하', postponed: '연기', unknown: '미확정' };
          const lab = _ar.quadrant || SMAP[_ar.status] || '결과';
          const rate = _ar.soldRate != null ? ' ' + Math.round(_ar.soldRate * 100) + '%' : '';
          td.appendChild(el('span', { cls: 'list-result-flag ' + (_ar.quadrant || _ar.status), text: lab + rate }));
        }
        tr.appendChild(td);
      }
      // saleDate + dday
      {
        const td = el('td', { cls: 'col-num' });
        td.appendChild(document.createTextNode(c.saleDate || '—'));
        if (dCls && c.verdict !== 'expired') {
          const b = el('span', { cls: 'dday-badge ' + dCls, text: ddayLabel(days) });
          b.style.marginLeft = '6px';
          td.appendChild(b);
        }
        tr.appendChild(td);
      }
      // caseNumber
      tr.appendChild(el('td', { cls: 'col-num', text: c.caseNumber }));
      // complex + dongHo
      {
        const td = el('td');
        td.appendChild(el('div', { cls: 'col-complex', text: c.complex || '—' }));
        if (c.dongHo || c.address) {
          const meta = (c.dongHo || '') + (c.address ? ' · ' + c.address : '');
          td.appendChild(el('div', { cls: 'col-meta', text: meta }));
        }
        tr.appendChild(td);
      }
      // region
      tr.appendChild(el('td', { text: c.region || '—' }));
      // area
      { const td = el('td', { cls: 'col-num' }); td.style.textAlign = 'right'; td.textContent = c.areaSqm ? c.areaSqm.toFixed(1) : '—'; tr.appendChild(td); }
      // minimumPrice
      { const td = el('td', { cls: 'col-num' }); td.style.textAlign = 'right'; td.textContent = fmtMoney(c.minimumPrice); td.title = fmtMoney(c.minimumPrice); tr.appendChild(td); }
      // kbPrice
      { const td = el('td', { cls: 'col-num' + (!c.kbPrice ? ' dim' : '') }); td.style.textAlign = 'right'; td.textContent = c.kbPrice ? fmtMoney(c.kbPrice) : '—'; if (c.kbPrice) td.title = fmtMoney(c.kbPrice); tr.appendChild(td); }
      // 기대매도가 (neutralSalePrice = 최근 실거래)
      { const td = el('td', { cls: 'col-num' + (c.neutralSalePrice == null ? ' dim' : '') }); td.style.textAlign = 'right'; td.textContent = c.neutralSalePrice ? fmtMoneyShort(c.neutralSalePrice) : '—'; if (c.neutralSalePrice) td.title = '보수 매도 기준(호가 하단) ' + fmtMoney(c.neutralSalePrice); tr.appendChild(td); }
      // 입찰권장가 (낙찰확률 70%)
      { const td = el('td', { cls: 'col-num' + (c.bid70 == null ? ' dim' : '') }); td.style.textAlign = 'right'; td.textContent = c.bid70 ? fmtMoneyShort(c.bid70) : '—'; if (c.bid70) td.title = '입찰 권장가(낙찰확률 70%) ' + fmtMoney(c.bid70); tr.appendChild(td); }
      // 예상수익 (세전 EP70, short form; 전액 hover)
      {
        const ep = c.expectedProfit70;
        const td = el('td', { cls: 'col-num' + (ep == null ? ' dim' : ep >= 0 ? ' ep-pos' : ' ep-neg') });
        td.style.textAlign = 'right';
        if (ep == null) td.textContent = '—';
        else { td.textContent = fmtMoneyShortSigned(ep); td.title = '세전 기대수익(EP70) ' + fmtMoneySigned(ep); }
        tr.appendChild(td);
      }
      // saleRate
      { const td = el('td', { cls: 'col-num' + (c.saleRate == null ? ' dim' : '') }); td.style.textAlign = 'right'; td.textContent = c.saleRate != null ? (c.saleRate * 100).toFixed(1) + '%' : '미확인'; tr.appendChild(td); }
      // rounds
      { const td = el('td'); td.style.textAlign = 'center'; td.textContent = c.rounds == null ? '—' : (c.rounds === 0 ? '신건' : c.rounds + '회'); tr.appendChild(td); }

      body.appendChild(tr);
    }
  }

  // ===== Tab switching =====
  function setView(view) {
    state.view = view;
    document.querySelectorAll('.tab').forEach((b) => b.classList.toggle('active', b.dataset.view === view));
    document.getElementById('calendar-view').hidden = view !== 'calendar';
    document.getElementById('list-view').hidden = view !== 'list';
    document.getElementById('month-nav').style.display = view === 'calendar' ? '' : 'none';
    if (view === 'list') renderList();
    else renderCalendar();
    syncUrl();
  }

  // ===== Deeplink (URL sync) =====
  function syncUrl(replace) {
    const params = new URLSearchParams();
    if (state.view !== 'calendar') params.set('view', state.view);
    if (state.selectedId) params.set('case', state.selectedId);
    const qs = params.toString();
    const url = qs ? '?' + qs : window.location.pathname;
    if (replace) history.replaceState({}, '', url);
    else history.pushState({}, '', url);
  }
  function applyUrl() {
    const params = new URLSearchParams(window.location.search);
    const v = params.get('view');
    if (v === 'list' || v === 'calendar') state.view = v;
    const id = params.get('case');
    if (id) state.selectedId = id;
  }

  // ===== Detail panel =====
  function verdictLabel(v) { return ({pending:'Pending', candidate:'Candidate', pass:'Pass', hold:'Hold', fail:'Fail', expired:'Expired'})[v] || v; }
  function riskLabel(r) { return ({safe:'안전', moderate:'중간', risky:'위험'})[r] || r; }

  function openDetail(id, opts) {
    const c = CASES.find((x) => x.id === id);
    if (!c) return;
    state.selectedId = id;
    const panel = document.getElementById('detail-panel');
    panel.classList.add('open');
    document.getElementById('panel-backdrop').classList.add('show'); // 모바일 backdrop
    const inner = document.getElementById('detail-inner');
    inner.replaceChildren();
    // Scroll to top + brief flash so user clearly perceives the panel changed
    inner.scrollTop = 0;
    inner.classList.remove('flash');
    void inner.offsetWidth; // force reflow so animation restarts even on rapid clicks
    inner.classList.add('flash');

    // Header
    const header = el('div', { cls: 'detail-header' });
    const left = el('div');
    // 사건번호 + 매각일(경량 인라인) — 캘린더가 날짜를 이미 보여주므로 상세에선 작게
    const titleRow = el('div', { cls: 'case-title-row' });
    titleRow.appendChild(el('div', { cls: 'case-num', text: c.caseNumber }));
    {
      const sd = el('span', { cls: 'case-saledate' });
      sd.appendChild(el('span', { cls: 'csd-ico', text: '📅' }));
      sd.appendChild(el('span', { cls: 'csd-date', text: c.saleDate || '—' }));
      const days = daysUntil(c.saleDate);
      if (days != null && c.verdict !== 'expired') {
        sd.appendChild(el('span', { cls: 'dday-detail ' + (ddayClass(days) || 'future'), text: ddayLabel(days) }));
      }
      titleRow.appendChild(sd);
    }
    left.appendChild(titleRow);
    left.appendChild(el('div', { cls: 'complex-sub', text: `${c.complex || '—'} ${c.dongHo || ''}`.trim() }));
    // 컨텍스트 칩 — 전용면적(강조)·담당법원·지역·유찰회차 (같은 레벨, 사건번호 옆 경량 강조)
    {
      const ctx = el('div', { cls: 'case-context' });
      const ctxChip = (ico, val, sub, extraCls) => {
        const chip = el('span', { cls: 'ctx-chip' + (extraCls ? ' ' + extraCls : '') });
        chip.appendChild(el('span', { cls: 'ctx-ico', text: ico }));
        chip.appendChild(el('span', { cls: 'ctx-val', text: val }));
        if (sub) chip.appendChild(el('span', { cls: 'ctx-sub', text: sub }));
        return chip;
      };
      if (c.areaSqm != null) ctx.appendChild(ctxChip('📐', fmtArea(c.areaSqm), null, 'ctx-area'));
      ctx.appendChild(ctxChip('🏛', c.court || '—'));
      ctx.appendChild(ctxChip('📍', c.region || '—', c.regionPriority ? 'P' + c.regionPriority : null));
      ctx.appendChild(ctxChip('🔁', c.rounds == null ? '—' : (c.rounds === 0 ? '신건' : c.rounds + '회 유찰')));
      left.appendChild(ctx);
    }
    header.appendChild(left);
    const actions = el('div', { cls: 'actions' });
    const shareBtn = el('button', { cls: 'icon-btn', text: '🔗 링크' });
    shareBtn.title = '이 사건 링크 복사';
    shareBtn.addEventListener('click', () => copyDeepLink(c.id, shareBtn));
    actions.appendChild(shareBtn);
    const closeBtn = el('button', { cls: 'close', text: '×', title: '닫기' });
    closeBtn.addEventListener('click', closeDetail);
    actions.appendChild(closeBtn);
    header.appendChild(actions);
    inner.appendChild(header);

    // 판정 배너 (v9.1) — 상세 최상단 의사결정 요약 (판정 + tier + 핵심 수익)
    {
      const vIcon = { candidate: '🟡', pass: '✅', hold: '⚪', fail: '🔴', pending: '🔵', expired: '⬜' }[c.verdict] || '•';
      const banner = el('div', { cls: 'verdict-banner v-' + c.verdict, attrs: { 'data-sec': 'banner' } });
      banner.appendChild(el('span', { cls: 'vb-icon', text: vIcon }));
      banner.appendChild(el('span', { cls: 'vb-verdict', text: verdictLabel(c.verdict) }));
      const tierMap = { primary: ['★ Primary', 't-primary'], watch: ['◇ Watch', 't-watch'], watchlist: ['▷ Watchlist', 't-watchlist'] };
      if (c.interestTier && tierMap[c.interestTier]) {
        banner.appendChild(el('span', { cls: 'vb-tier ' + tierMap[c.interestTier][1], text: tierMap[c.interestTier][0] }));
      } else if (c.expectedProfit70 != null && c.expectedProfit70 <= -10_000_000) {
        banner.appendChild(el('span', { cls: 'vb-tier t-excl', text: '제외 (예상 적자)' }));
      }
      if (c.rightsRisk) banner.appendChild(el('span', { cls: 'vb-risk', text: '권리 ' + riskLabel(c.rightsRisk) + (c.rightsVerified === false ? ' · 미검증' : '') }));
      // 1줄 요지 (판정사유 첫 문장)
      const rsn = (c.verdictReason || '').replace(/\s*\([^()]*(?:\d{4}-\d{2}-\d{2}|v\d|sourcing|sweep|회고|차\s*분석)[^()]*\)\s*$/i, '').trim();
      const firstSentence = rsn ? (rsn.split(/\.\s+/)[0].replace(/\.$/, '').slice(0, 120)) : null;
      if (firstSentence) banner.appendChild(el('span', { cls: 'vb-line', text: firstSentence }));
      // 핵심 수익 키
      if (c.expectedProfit70 != null || c.afterTaxProfit != null) {
        const k = el('div', { cls: 'vb-key' });
        const pair = (kk, v, cls) => { const w = el('span'); w.appendChild(el('span', { cls: 'kk', text: kk + ' ' })); w.appendChild(el('span', { cls: 'vv' + (cls ? ' ' + cls : ''), text: v })); return w; };
        if (c.expectedProfit70 != null) k.appendChild(pair('세전 EP70', fmtMoneySigned(c.expectedProfit70), c.expectedProfit70 < 0 ? 'neg' : c.expectedProfit70 >= 25_000_000 ? 'pos' : null));
        if (c.afterTaxProfit != null) k.appendChild(pair('세후', fmtMoneySigned(c.afterTaxProfit), c.afterTaxProfit < 0 ? 'neg' : 'pos'));
        if (c.bid70 != null) k.appendChild(pair('입찰권장', fmtMoneyShort(c.bid70)));
        banner.appendChild(k);
      }
      inner.appendChild(banner);
    }

    // 🏁 경매 결과 (회고 — 예측 vs 실측). results.js와 id로 join.
    // resultFor: 미래 기일·회차 충돌 결과는 숨김(과거 회차 결과가 재지정된 미래 사건에 노출되는 것 방지).
    const ar = resultFor(c);
    if (ar) {
      const QLAB = { TP: '정확 GO', FP: '헛 GO', FN: '놓친 기회', TN: '정확 NO-GO' };
      const SLAB = { sold: '매각(낙찰)', failed: '유찰', changed: '변경', withdrawn: '취하', postponed: '연기', unknown: '미확인(변경/취하 추정)' };
      const rsec = section('🏁 경매 결과 (회고)', { key: 'result' });
      const box = el('div', { cls: 'result-box ' + (ar.quadrant ? 'q-' + ar.quadrant : 'q-none') });
      const head = el('div', { cls: 'result-head' });
      head.appendChild(el('span', { cls: 'result-status ' + ar.status, text: SLAB[ar.status] || ar.status }));
      if (ar.quadrant) head.appendChild(el('span', { cls: 'result-quadrant ' + ar.quadrant, text: ar.quadrant + ' · ' + (QLAB[ar.quadrant] || '') }));
      box.appendChild(head);
      const rg = el('div', { cls: 'detail-grid' });
      rg.appendChild(field('낙찰가', ar.soldPrice != null ? fmtMoney(ar.soldPrice) : (ar.priceMasked ? '🔒 마스킹' : '—'), { mono: true, price: true, muted: ar.soldPrice == null }));
      rg.appendChild(field('낙찰가율', ar.soldRate != null ? fmtPct(ar.soldRate) : '—', { mono: true, muted: ar.soldRate == null }));
      rg.appendChild(field('응찰자수', ar.bidderCount != null ? ar.bidderCount + '명' : '—', { mono: true, muted: ar.bidderCount == null }));
      rg.appendChild(field('실제 매각일', ar.saleDateActual || '—', { mono: true, muted: !ar.saleDateActual }));
      if (ar.secondBid != null) rg.appendChild(field('2위 응찰가', fmtMoney(ar.secondBid), { mono: true, price: true }));
      box.appendChild(rg);
      if (ar.predictedSaleRate != null || ar.soldRate != null) {
        const cmp = el('div', { cls: 'result-compare' });
        cmp.appendChild(el('span', { cls: 'k', text: '예측 매각가율' }));
        cmp.appendChild(el('span', { cls: 'v', text: ar.predictedSaleRate != null ? fmtPct(ar.predictedSaleRate) : '—' }));
        cmp.appendChild(el('span', { cls: 'arrow', text: '→' }));
        cmp.appendChild(el('span', { cls: 'k', text: '실측' }));
        cmp.appendChild(el('span', { cls: 'v', text: ar.soldRate != null ? fmtPct(ar.soldRate) : '🔒' }));
        if (ar.saleRateError != null) cmp.appendChild(el('span', { cls: 'err' + (ar.saleRateError < 0 ? ' neg' : ' pos'), text: (ar.saleRateError > 0 ? '+' : '') + (ar.saleRateError * 100).toFixed(1) + 'pp' }));
        box.appendChild(cmp);
      }
      if (ar.lesson) box.appendChild(el('div', { cls: 'result-lesson', text: '📌 ' + ar.lesson }));
      const foot = el('div', { cls: 'result-foot' });
      foot.appendChild(el('span', { text: '출처 ' + (ar.source || '—') }));
      if (ar.retrospectedAt) foot.appendChild(el('span', { text: '회고 ' + ar.retrospectedAt }));
      box.appendChild(foot);
      rsec.appendChild(box);
      inner.appendChild(rsec);
    }

    // Numbers
    const numSec = section('핵심 수치', { boxed: true, key: 'numbers' });
    const grid = el('div', { cls: 'detail-grid' });
    const marginRaw = (c.kbPrice && c.minimumPrice) ? c.kbPrice - c.minimumPrice : null;
    const marginPct = (marginRaw != null && c.kbPrice) ? marginRaw / c.kbPrice : null;
    const dropPct = (c.minimumPrice && c.appraisalPrice) ? c.minimumPrice / c.appraisalPrice : null;
    grid.appendChild(field('감정가', fmtMoney(c.appraisalPrice), { mono: true, price: true }));
    const minNode = el('span');
    minNode.appendChild(document.createTextNode(fmtMoney(c.minimumPrice)));
    if (dropPct != null) { const s = el('span', { cls: 'sub-note', text: ` ${(dropPct*100).toFixed(0)}%` }); s.style.marginLeft = '6px'; minNode.appendChild(s); }
    grid.appendChild(field('최저매각가', minNode, { mono: true, price: true }));
    grid.appendChild(field('KB시세', c.kbPrice ? fmtMoney(c.kbPrice) : '미확인', { mono: true, price: true, muted: !c.kbPrice }));
    const marginNode = el('span');
    marginNode.appendChild(document.createTextNode(marginRaw == null ? '—' : fmtMoneySigned(marginRaw)));
    if (marginPct != null) { const s = el('span', { cls: 'sub-note', text: ` ${(marginPct*100).toFixed(0)}%` }); s.style.marginLeft = '6px'; marginNode.appendChild(s); }
    const marginTone = marginRaw == null ? null
      : marginRaw >= 5_000_000 ? 'positive'
      : marginRaw < 0 ? 'negative'
      : null;
    grid.appendChild(field('미시 마진 (KB−최저)', marginNode, { mono: true, price: true, muted: marginRaw == null, tone: marginTone }));
    const saleRateNode = el('span');
    const derivedRate = deriveSaleRate(c);
    if (derivedRate) {
      saleRateNode.appendChild(document.createTextNode(fmtPct(derivedRate.value)));
      if (c.saleRate == null) {
        const tag = el('span', { cls: 'priority-tag', text: '자동 · ' + derivedRate.source });
        saleRateNode.appendChild(tag);
      }
    } else {
      saleRateNode.appendChild(document.createTextNode('미확인'));
    }
    if (c.saleRateNote) saleRateNode.appendChild(el('div', { cls: 'small-note', text: c.saleRateNote }));
    grid.appendChild(field('단지 매각가율', saleRateNode, { mono: true, muted: !derivedRate }));
    numSec.appendChild(grid);
    inner.appendChild(numSec);

    // 📄 상세 분석 보고서 (deep-dive 케이스) — 같은 디렉토리의 report HTML로 링크
    if (c.reportUrl) {
      const rpSec = section('📄 상세 분석 보고서', { key: 'report' });
      const a = el('a', { cls: 'report-link', attrs: { href: c.reportUrl, target: '_blank', rel: 'noopener' } });
      a.appendChild(el('span', { cls: 'rp-ico', text: '📄' }));
      a.appendChild(document.createTextNode('심층 분석 보고서 열기'));
      a.appendChild(el('span', { cls: 'rp-arrow', text: '→' }));
      rpSec.appendChild(a);
      rpSec.appendChild(el('div', { cls: 'small-note', text: 'deep-dive 풀 파이프라인 — 권리·시장앵커·입찰가 곡선·입찰 3안 비교·수익화·D-day 액션' }));
      inner.appendChild(rpSec);
    }

    // 💰 수익 분석 (v9) — 보수 매도 기준·입찰권장가(70%)·고정비용·이자 band·EP70·종소세·세후
    if (c.expectedProfit70 != null || c.bid70 != null || c.neutralSalePrice != null) {
      const ep = (c.expectedProfit70 != null) ? c.expectedProfit70 : null;
      const cb = c.costBreakdown || null;
      const cost = cb ? (cb.fixedTotal + (cb.interest ? cb.interest['m'+(cb.anchorMonths||4)] : 0))
                      : ((c.neutralSalePrice != null && c.bid70 != null && ep != null) ? (c.neutralSalePrice - c.bid70 - ep) : null);
      const tierMap = {
        primary:   { t: '★ Primary (세전 ≥2,500만)', cls: 'tier-star' },
        watch:     { t: '◇ Watch (1,500~2,500만)',   cls: 'tier-watch' },
        watchlist: { t: '▷ Watchlist (본전~1,500만)', cls: 'tier-watchlist' },
      };
      const profSec = section('💰 수익 분석 (세전 · 낙찰확률 70% 기준)', { boxed: true, accent: 'profit', key: 'profit' });
      if (c.interestTier && tierMap[c.interestTier]) {
        profSec.appendChild(el('span', { cls: 'tier-badge ' + tierMap[c.interestTier].cls, text: tierMap[c.interestTier].t }));
      } else if (ep != null && ep <= -10_000_000) {
        profSec.appendChild(el('span', { cls: 'tier-badge tier-excl', text: '제외 (예상 적자 ≥1,000만)' }));
      }
      const pgrid = el('div', { cls: 'detail-grid' });
      if (c.neutralSalePrice != null) {
        const sNode = el('span');
        sNode.appendChild(document.createTextNode(fmtMoney(c.neutralSalePrice)));
        if (c.marketAnchorBasis) sNode.appendChild(el('div', { cls: 'small-note', text: c.marketAnchorBasis }));
        pgrid.appendChild(field('보수 매도 기준', sNode, { mono: true, price: true }));
      }
      if (c.bid70 != null) pgrid.appendChild(field('입찰 권장가 (낙찰확률 70%)', fmtMoney(c.bid70), { mono: true, price: true, tone: 'positive' }));
      profSec.appendChild(pgrid);

      // 비용 내역 (고정비용 + 이자 보유개월 band)
      if (cb) {
        const cwrap = el('div'); cwrap.style.marginTop = '8px';
        cwrap.appendChild(el('div', { cls: 'small-note', text: '예상 비용 (수리·명도 제외)' }));
        const cl = (k, v) => { const d = el('div', { cls: 'cost-line' }); d.appendChild(el('span', { text: k })); d.appendChild(el('span', { cls: 'v', text: fmtMoney(v) })); return d; };
        cwrap.appendChild(cl('취득세·법무등기 (법무통)', cb.acq));
        cwrap.appendChild(cl('중개비 (매도 0.4%)', cb.brokerage));
        cwrap.appendChild(cl('기타 (관리비·잡비)', cb.etc));
        // 이자 표 3~6개월
        if (cb.interest) {
          const t = el('table', { cls: 'int-table' });
          const hr = el('tr'); hr.appendChild(el('th', { cls:'lbl', text: '대출이자 (보유)' }));
          [3,4,5,6].forEach(m => hr.appendChild(el('th', { text: m + '개월' })));
          const th = el('thead'); th.appendChild(hr); t.appendChild(th);
          const br = el('tr'); br.appendChild(el('td', { cls:'lbl', text: `LTV ${Math.round((cb.ltv||0.8)*100)}%·${((cb.rate||0.045)*100).toFixed(1)}%` }));
          [3,4,5,6].forEach(m => { const td = el('td', { cls: (m===(cb.anchorMonths||4)?'anchor':''), text: fmtMoney(cb.interest['m'+m]) }); br.appendChild(td); });
          const tb = el('tbody'); tb.appendChild(br); t.appendChild(tb);
          cwrap.appendChild(t);
          cwrap.appendChild(el('div', { cls: 'small-note', text: `EP70은 ${cb.anchorMonths||4}개월 기준(앰버 강조). 보유기간 가정에 따라 이자만큼 수익 변동.` }));
        }
        profSec.appendChild(cwrap);
      }

      // EP70 (세전, 수리·명도 제외)
      const epgrid = el('div', { cls: 'detail-grid' }); epgrid.style.marginTop = '8px';
      if (ep != null) {
        const epTone = ep >= 25_000_000 ? 'positive' : ep <= -10_000_000 ? 'negative' : null;
        epgrid.appendChild(field('예상 수익 (세전 · EP70)', fmtMoneySigned(ep), { mono: true, price: true, tone: epTone }));
      }
      if (c.repairCost != null) epgrid.appendChild(field('예상 수리비 (참고·리모델링 시)', fmtMoney(c.repairCost), { mono: true, muted: true }));
      profSec.appendChild(epgrid);

      // 💵 종합소득세·세후 (실현이익 기준, 배우자 합산 누진)
      if (c.taxableProfit != null && c.incomeTax != null) {
        const tb = el('div', { cls: 'tax-box' });
        const ownerTxt = (c.taxOwner === 'self') ? '본인' : '배우자';
        tb.appendChild(el('div', { cls: 'tb-title', text: `💵 실현이익 기준 세금 (${ownerTxt} 연봉 합산 누진)` }));
        const trow = (k, v, cls) => { const d = el('div', { cls: 'tb-row' + (cls?' '+cls:'') }); d.appendChild(el('span', { cls:'k', text:k })); d.appendChild(el('span', { cls:'v', text:v })); return d; };
        tb.appendChild(trow('실현 세전이익 (EP70 − 실수리 − 명도)', fmtMoneySigned(c.taxableProfit)));
        const mr = c.marginalRate != null ? ` (한계 ${(c.marginalRate*100).toFixed(1)}%)` : '';
        tb.appendChild(trow('종합소득세' + mr, '−' + fmtMoney(c.incomeTax)));
        if (c.afterTaxProfit != null) tb.appendChild(trow('세후 이익', fmtMoneySigned(c.afterTaxProfit), 'after'));
        profSec.appendChild(tb);
        const fr = (c.flipRepair!=null?`실수리 ${fmtMoney(c.flipRepair)}`:'') + (c.evictionEst!=null?` · 명도 ${fmtMoney(c.evictionEst)}`:'');
        profSec.appendChild(el('div', { cls: 'small-note', text: `과세표준 = 실현 세전이익(${fr} 차감, as-is 매도 가정). 배우자 근로 ₩36M 합산 한계세율(지방세 포함). 매도가>₩355M이면 본인 명의 비교. 정본: bid-price-engine §0.5 v9` }));
      } else {
        profSec.appendChild(el('div', { cls: 'small-note', text: '세전 = 종소세·명도·인수금·수리 제외. 보수 매도 기준=호가 하단(시세 range는 아래 시세 섹션). 정본: bid-price-engine §0.5 v9' }));
      }
      inner.appendChild(profSec);
    }

    // 🎯 내 예상 낙찰가 (predictions.js) — 사건당 최대 2개.
    // 매각 결과 도래 시 [내 예상 N개 + 모델 예측(감정가×예측매각가율)] vs 실측 3자 오차를 일괄 비교, 최소 |오차%| 강조.
    {
      const myBids = predictionBids(c);
      if (myBids.length) {
        const modelBid = modelExpectedBid(c);
        const ar = resultFor(c);
        const actual = (ar && ar.soldPrice != null) ? ar.soldPrice : null;
        const mark = i => (myBids.length > 1 ? ['①', '②'][i] : '');
        const psec = section('🎯 내 예상 낙찰가', { boxed: true, accent: 'pred', key: 'pred' });

        if (actual != null) {
          // 결과 후 — 후보(내 예상들 + 모델) 일괄 비교
          const rows = myBids.map((b, i) => ({ label: ('내 예상 ' + mark(i)).trim(), value: b.value, isModel: false }));
          if (modelBid != null) rows.push({ label: '모델 예측', value: modelBid, isModel: true });
          rows.forEach(r => { r.err = actual - r.value; r.errPct = r.value ? r.err / r.value : null; });
          const ranked = rows.filter(r => r.errPct != null).slice().sort((a, b) => Math.abs(a.errPct) - Math.abs(b.errPct));
          const best = ranked.length ? ranked[0] : null;

          const box = el('div', { cls: 'pred-box' });
          rows.forEach(r => {
            const line = el('div', { cls: 'pred-cmp' + (r === best ? ' best' : '') + (r.isModel ? ' model' : '') });
            line.appendChild(el('span', { cls: 'pk', text: r.label }));
            line.appendChild(el('span', { cls: 'pv', text: fmtMoney(r.value) }));
            line.appendChild(el('span', { cls: 'arrow', text: '→' }));
            line.appendChild(el('span', { cls: 'pa', text: fmtMoney(actual) }));
            if (r.errPct != null) {
              const sgn = r.err > 0 ? '+' : '';
              line.appendChild(el('span', { cls: 'perr' + (r.err < 0 ? ' neg' : r.err > 0 ? ' pos' : ''), text: sgn + fmtMoney(r.err) + ' (' + sgn + (r.errPct * 100).toFixed(1) + '%)' }));
            }
            box.appendChild(line);
          });
          if (best) box.appendChild(el('div', { cls: 'pred-winner', text: '🏆 가장 정확: ' + best.label + ' (' + (best.errPct > 0 ? '+' : '') + (best.errPct * 100).toFixed(1) + '%)' }));
          psec.appendChild(box);
          myBids.forEach((b, i) => { if (b.memo) psec.appendChild(el('div', { cls: 'small-note', text: (mark(i) ? mark(i) + ' ' : '') + b.memo })); });
        } else {
          // 결과 전 — 내 예상(들) + 모델 참고
          const grid = el('div', { cls: 'detail-grid' });
          myBids.forEach((b, i) => {
            const node = el('span');
            node.appendChild(document.createTextNode(fmtMoney(b.value)));
            const sub = [];
            if (b.memo) sub.push(b.memo);
            if (b.at) sub.push(b.at);
            if (sub.length) node.appendChild(el('div', { cls: 'small-note', text: sub.join(' · ') }));
            grid.appendChild(field(('내 예상 ' + mark(i)).trim(), node, { mono: true, price: true, tone: 'positive' }));
          });
          if (modelBid != null) grid.appendChild(field('모델 예측 (참고)', fmtMoney(modelBid), { mono: true, price: true, muted: true }));
          psec.appendChild(grid);
          psec.appendChild(el('div', { cls: 'small-note', text: '모델 예측 = 감정가 × 예측 매각가율. 매각 결과가 나오면 내 예상·모델·실측 3자 오차가 자동 비교됩니다.' }));
        }
        inner.appendChild(psec);
      }
    }

    // 판정 사유 (권리 상태 직전 배치) — verdict 헤더 + 문장 단위 정리 + 출처/버전 각주
    {
      const reasonSec = section('판정 사유', { key: 'reason' });
      const box = el('div', { cls: 'reason-box ' + c.verdict });
      const head = el('div', { cls: 'reason-head' });
      head.appendChild(el('span', { cls: 'verdict-badge ' + c.verdict, text: verdictLabel(c.verdict) }));
      box.appendChild(head);
      const raw = (c.verdictReason || '').trim();
      if (!raw) {
        box.appendChild(el('div', { cls: 'reason-body', text: '—' }));
      } else {
        // 끝에 붙은 출처/버전 괄호(예: "(2026-06-01 v4)", "(1차 sourcing 분석)")는 각주로 분리
        let bodyTxt = raw, foot = null;
        const fm = raw.match(/\s*\(([^()]*(?:\d{4}-\d{2}-\d{2}|v\d|sourcing|sweep|회고|차\s*분석)[^()]*)\)\s*$/i);
        if (fm) { foot = fm[1].trim(); bodyTxt = raw.slice(0, fm.index).trim(); }
        // 문장 단위 분리(". " 기준 — "3.1%" 등 소수점은 뒤 공백이 없어 안전)
        const sentences = bodyTxt.split(/\.\s+/).map((s) => s.trim().replace(/\.$/, '')).filter(Boolean);
        if (sentences.length >= 2) {
          const list = el('div', { cls: 'reason-list' });
          sentences.forEach((s) => list.appendChild(el('div', { cls: 'reason-item', text: s })));
          box.appendChild(list);
        } else {
          box.appendChild(el('div', { cls: 'reason-body', text: bodyTxt }));
        }
        if (foot) {
          const footEl = el('div', { cls: 'reason-foot' });
          footEl.appendChild(el('span', { text: '🗓' }));
          footEl.appendChild(document.createTextNode(foot));
          box.appendChild(footEl);
        }
      }
      reasonSec.appendChild(box);
      inner.appendChild(reasonSec);
    }

    // Rights
    const rightsSec = section('권리 상태', { key: 'rights' });
    rightsSec.appendChild(el('div', { cls: 'value', text: c.rightsStatus || '—' }));
    inner.appendChild(rightsSec);

    // Address
    const addrSec = section('주소', { key: 'address' });
    addrSec.appendChild(el('div', { cls: 'value dim', text: c.address || '—' }));
    inner.appendChild(addrSec);

    // Naver Real Estate
    const naverSec = section('🟢 시장 시세 (네이버)', { key: 'market' });
    naverSec.classList.add('naver-section');
    const naverLinks = el('div', { cls: 'naver-links' });
    const complexUrl = naverComplexUrl(c);
    if (complexUrl) {
      const a = el('a', { cls: 'naver-link', attrs: { href: complexUrl, target: '_blank', rel: 'noopener' } });
      a.appendChild(el('span', { cls: 'ico', text: 'N' }));
      a.appendChild(document.createTextNode('단지 페이지'));
      naverLinks.appendChild(a);
    }
    {
      const a = el('a', { cls: 'naver-link', attrs: { href: naverSearchUrl(c), target: '_blank', rel: 'noopener' } });
      a.appendChild(el('span', { cls: 'ico', text: 'N' }));
      a.appendChild(document.createTextNode('부동산 검색'));
      naverLinks.appendChild(a);
    }
    {
      const a = el('a', { cls: 'naver-link', attrs: { href: naverIntegratedSearchUrl(c), target: '_blank', rel: 'noopener' } });
      a.appendChild(el('span', { cls: 'ico', text: 'N' }));
      a.appendChild(document.createTextNode('통합 검색'));
      naverLinks.appendChild(a);
    }
    naverSec.appendChild(naverLinks);

    if (c.naverData) {
      const nd = el('div', { cls: 'naver-data' });
      // 6개월 컷오프 (오늘 − 6개월)
      const cut6 = (() => { const d = new Date(); d.setMonth(d.getMonth() - 6); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
      if (c.naverData.source) {
        const srcLabels = { naver: '🟢 네이버 부동산', molit_public: '📊 국토부 공공 실거래', user: '✋ 사용자 입력' };
        const srcLabel = srcLabels[c.naverData.source] || c.naverData.source;
        const srcRow = el('div', { cls: 'k', text: '출처: ' + srcLabel + (c.naverData.pyeong ? ` · 전용 ${(+c.naverData.pyeong.exc).toFixed(0)}㎡` : '') });
        srcRow.style.marginBottom = '6px';
        nd.appendChild(srcRow);
      }
      // 현시점 호가 분포 바 (v9.1 — track + ticks + legend, 라벨 오버플로 없음)
      const ap = c.naverData.askingPrice;
      if (ap && ap.low) {
        const wrap = el('div', { cls: 'hoga-range' });
        const head = el('div', { cls: 'hr-head' });
        const hl = el('span'); hl.appendChild(document.createTextNode('현시점 호가 ')); hl.appendChild(el('b', { text: '동일 ' + (ap.area ? (+ap.area).toFixed(0) + '㎡' : '평형') }));
        head.appendChild(hl);
        head.appendChild(el('span', { text: (ap.count || 0) + '건' }));
        wrap.appendChild(head);
        if (ap.high && ap.high > ap.low) {
          const lt = c.naverData.lastTrade;
          const span = ap.high - ap.low;
          const pctOf = v => Math.max(2, Math.min(98, ((v - ap.low) / span) * 100));
          const track = el('div', { cls: 'hr-track' });
          if (lt && lt.price != null) { const t = el('div', { cls: 'hr-tick trade' }); t.style.left = pctOf(lt.price).toFixed(1) + '%'; t.title = '최근 실거래 ' + fmtMoney(lt.price); track.appendChild(t); }
          if (c.neutralSalePrice != null) { const a = el('div', { cls: 'hr-tick anchor' }); a.style.left = pctOf(c.neutralSalePrice).toFixed(1) + '%'; a.title = '보수 매도 기준 ' + fmtMoney(c.neutralSalePrice); track.appendChild(a); }
          wrap.appendChild(track);
          const ends = el('div', { cls: 'hr-ends' });
          { const lo = el('span'); lo.appendChild(el('span', { cls: 'cap', text: '호가 하단' })); lo.appendChild(document.createTextNode(fmtMoney(ap.low))); ends.appendChild(lo); }
          { const hi = el('span', { cls: 'hi' }); hi.appendChild(el('span', { cls: 'cap', text: '호가 상단' })); hi.appendChild(document.createTextNode(fmtMoney(ap.high))); ends.appendChild(hi); }
          wrap.appendChild(ends);
          // 범례 (마커 값 — 가장자리 오버플로 없는 일반 흐름)
          const lg = el('div', { cls: 'hr-legend' });
          if (lt && lt.price != null) { const e = el('div', { cls: 'lg' }); e.appendChild(el('span', { cls: 'dot trade' })); e.appendChild(document.createTextNode('최근 실거래 ')); e.appendChild(el('b', { text: fmtMoneyShort(lt.price) + (lt.date ? ' (' + lt.date.slice(2) + ')' : '') })); lg.appendChild(e); }
          if (c.neutralSalePrice != null) { const e = el('div', { cls: 'lg' }); e.appendChild(el('span', { cls: 'dot anchor' })); e.appendChild(document.createTextNode('보수 매도 기준 ')); e.appendChild(el('b', { text: fmtMoneyShort(c.neutralSalePrice) })); lg.appendChild(e); }
          wrap.appendChild(lg);
        } else {
          const single = el('div', { cls: 'hr-ends' });
          { const lo = el('span'); lo.appendChild(el('span', { cls: 'cap', text: '호가 (단일 매물)' })); lo.appendChild(document.createTextNode(fmtMoney(ap.low))); single.appendChild(lo); }
          wrap.appendChild(single);
        }
        nd.appendChild(wrap);
      } else {
        nd.appendChild(el('div', { cls: 'small-note', text: '현시점 동일 평형 매물 0건 (호가 미형성 — 보수 매도 기준은 최근 실거래 기준)' }));
      }
      // 가장 최근 실거래 강조 (#2)
      const lt = c.naverData.lastTrade || (Array.isArray(c.naverData.recentTrades) && c.naverData.recentTrades[0]);
      if (lt) {
        const box = el('div', { cls: 'last-trade' });
        box.appendChild(el('span', { cls: 'lt-date', text: '최근 실거래 ' + (lt.date||'—') }));
        box.appendChild(el('span', { cls: 'lt-price', text: fmtMoney(lt.price) }));
        box.appendChild(el('span', { cls: 'lt-meta', text: (lt.floor? lt.floor+'층':'') }));
        nd.appendChild(box);
      }
      // 실거래 리스트 (6개월 초과는 흐리게 + 구분선)
      if (Array.isArray(c.naverData.recentTrades) && c.naverData.recentTrades.length > 1) {
        const list = el('div', { cls: 'trade-list' });
        nd.appendChild(el('div', { cls: 'k', text: '실거래 내역 (네이버)' }));
        let sepShown = false;
        for (const t of c.naverData.recentTrades.slice(0, 8)) {
          const stale = t.date && t.date < cut6;
          if (stale && !sepShown) { list.appendChild(el('div', { cls: 'trade-sep', text: '─── 6개월 초과 (참고) ───' })); sepShown = true; }
          const item = el('div', { cls: 'trade-item' + (stale ? ' stale' : '') });
          item.appendChild(el('span', { cls: 'date', text: t.date || '—' }));
          item.appendChild(el('span', { cls: 'price', text: fmtMoney(t.price) }));
          item.appendChild(el('span', { cls: 'area', text: (t.area != null) ? (+t.area).toFixed(0) + '㎡' : '—' }));
          item.appendChild(el('span', { cls: 'floor', text: t.floor ? t.floor + '층' : '' }));
          list.appendChild(item);
        }
        nd.appendChild(list);
      }
      if (c.naverData.updatedAt) {
        nd.appendChild(el('div', { cls: 'naver-updated', text: '시세 갱신: ' + c.naverData.updatedAt }));
      }
      naverSec.appendChild(nd);
    } else {
      const empty = el('div', { cls: 'naver-data' });
      empty.appendChild(el('div', { cls: 'empty', text: '네이버 호가·실거래 데이터 미수집. cases.js의 naverData 필드에 채워주세요 (README 참고).' }));
      naverSec.appendChild(empty);
    }
    inner.appendChild(naverSec);


    // 단지 응집 — 같은 단지의 다른 사건
    {
      const sameComplex = CASES.filter((x) => x.id !== c.id && x.complex === c.complex);
      if (sameComplex.length) {
        const relSec = section(`같은 단지 다른 사건 (${sameComplex.length}건)`, { key: 'related' });
        const list = el('div', { cls: 'related-cases' });
        sameComplex.sort((a, b) => (b.saleDate || '').localeCompare(a.saleDate || ''));
        for (const r of sameComplex) {
          const row = el('div', { cls: 'related-row' });
          row.title = `${r.caseNumber} · ${r.dongHo || ''} · ${r.saleDate}`;
          const rating = effectiveRating(r);
          row.appendChild(el('span', { cls: 'r-rating ' + (rating != null ? 'r' + rating : 'none'), text: rating != null ? rating + '' : '·' }));
          const main = el('div', { cls: 'r-main' });
          main.appendChild(el('span', { cls: 'r-case', text: r.caseNumber + (r.dongHo ? ' · ' + r.dongHo : '') }));
          const metaText = [r.saleDate, r.areaSqm ? r.areaSqm.toFixed(1) + '㎡' : null, fmtMoney(r.minimumPrice)].filter(Boolean).join(' · ');
          main.appendChild(el('span', { cls: 'r-meta', text: metaText }));
          row.appendChild(main);
          row.appendChild(el('span', { cls: 'r-verdict ' + r.verdict, text: r.verdict }));
          row.addEventListener('click', () => openDetail(r.id));
          list.appendChild(row);
        }
        relSec.appendChild(list);
        inner.appendChild(relSec);
      }
    }

    // Sales history (단지 매각 이력)
    if (Array.isArray(c.salesHistory) && c.salesHistory.length) {
      const histSec = section('단지 매각 이력 (지지옥션)', { key: 'history' });
      const valid = c.salesHistory.filter((s) => !s.outlier);
      if (valid.length) {
        const avgSoldRate = valid.reduce((a, s) => a + (s.soldRate || 0), 0) / valid.length;
        const avgKbRate = valid.filter((s) => s.kbRate != null).reduce((a, s, _, arr) => a + s.kbRate / arr.length, 0);
        const sum = el('div', { cls: 'sales-history-summary' });
        sum.appendChild(el('span', { cls: 'label', text: `정상치 ${valid.length}건 평균 매각가율 (감정) ` }));
        const rateCls = avgSoldRate <= 0.78 ? 'value ok' : avgSoldRate >= 0.88 ? 'value warn' : 'value';
        sum.appendChild(el('span', { cls: rateCls, text: (avgSoldRate * 100).toFixed(1) + '%' }));
        if (avgKbRate) {
          sum.appendChild(el('span', { cls: 'label', text: ' · KB 평균 ' }));
          sum.appendChild(el('span', { cls: 'value', text: (avgKbRate * 100).toFixed(1) + '%' }));
        }
        histSec.appendChild(sum);
      }

      const table = el('table', { cls: 'sales-history-table' });
      const thead = el('thead');
      const headRow = el('tr');
      ['매각일', '동·층', '면적', '감정가', '매각가', '매각가율'].forEach((h) => headRow.appendChild(el('th', { text: h })));
      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = el('tbody');
      const sortedHist = c.salesHistory.slice().sort((a, b) => (b.saleDate || '').localeCompare(a.saleDate || ''));
      for (const s of sortedHist) {
        const tr = el('tr');
        if (s.outlier) {
          tr.classList.add('outlier');
          tr.title = s.outlierReason || '제외 (outlier)';
        }
        tr.appendChild(el('td', { text: s.saleDate || '—' }));
        tr.appendChild(el('td', { text: s.dongHo || '—' }));
        tr.appendChild(el('td', { text: s.area ? s.area.toFixed(2) + '㎡' : '—' }));
        tr.appendChild(el('td', { text: s.appraisal ? fmtMoney(s.appraisal) : '—' }));
        tr.appendChild(el('td', { text: s.soldPrice ? fmtMoney(s.soldPrice) : '—' }));
        if (s.soldRate != null) {
          const cls = s.soldRate <= 0.78 ? 'rate-low' : s.soldRate >= 0.88 ? 'rate-high' : 'rate-mid';
          tr.appendChild(el('td', { cls, text: (s.soldRate * 100).toFixed(1) + '%' }));
        } else {
          tr.appendChild(el('td', { text: '—' }));
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      histSec.appendChild(table);

      const outliers = c.salesHistory.filter((s) => s.outlier);
      if (outliers.length) {
        const note = el('div', { cls: 'outlier-note', text: `※ ${outliers.length}건은 매각가율 평균에서 제외 (다른 평형·시장침체기·신건 등). 행 클릭/hover 시 사유 표시.` });
        histSec.appendChild(note);
      }
      inner.appendChild(histSec);
    }

    // Tags
    if (c.tags && c.tags.length) {
      const tagSec = section('태그', { key: 'tags' });
      const tagList = el('div', { cls: 'tag-list' });
      for (const t of c.tags) tagList.appendChild(el('span', { cls: 'tag', text: t }));
      tagSec.appendChild(tagList);
      inner.appendChild(tagSec);
    }

    // Rating + breakdown
    const ratingResult = getRating(c);
    const finalRating = c.rating != null ? c.rating : ratingResult.rating;
    const rateSec = section('추천도 · 채점 (v8 — EP70·수리비·신뢰도)', { key: 'rating' });
    const stars = el('div', { cls: 'rating-stars' });
    for (let i = 0; i < 5; i++) {
      stars.appendChild(el('span', { cls: 'star' + (finalRating != null && i < finalRating ? ' on' : ''), text: '★' }));
    }
    rateSec.appendChild(stars);
    const noteParts = [];
    if (finalRating != null) noteParts.push(`${finalRating}점`);
    else noteParts.push('미부여');
    if (c.rating != null) noteParts.push('사용자 부여');
    else if (ratingResult.note) noteParts.push('자동(' + ratingResult.note + ')');
    else noteParts.push(`자동 · 점수 ${ratingResult.score}/100`);
    rateSec.appendChild(el('div', { cls: 'rating-note', text: noteParts.join(' · ') }));
    if (ratingResult.breakdown && c.rating == null) {
      const bd = ratingResult.breakdown;
      if (bd.kind === 'v8') {
        const t8 = el('div', { cls: 'breakdown' });
        const addR = (label, val) => { const r = el('div', { cls: 'breakdown-row' }); r.appendChild(el('span', { cls: 'b-label', text: label })); r.appendChild(el('span', { cls: 'b-score', text: val })); t8.appendChild(r); };
        addR('EP70 등급', '★' + bd.base + ' · ' + bd.baseLabel);
        addR('− 수리비 페널티', bd.repairLabel + (bd.repairCost != null ? ' (예상 ' + fmtMoney(bd.repairCost) + ')' : ''));
        addR('− 신뢰도 페널티', bd.confPen ? '−1 (' + bd.confReasons.join(', ') + ')' : '없음');
        addR('= 최종 추천도', '★' + finalRating);
        rateSec.appendChild(t8);
      } else {
      const labels = {
        saleRate: ['단지 매각가율', 30],
        margin:   ['미시 마진', 25],
        rights:   ['권리 안전성', 20],
        region:   ['지역 우선순위', 15],
        rounds:   ['유찰 회차', 10],
      };
      const table = el('div', { cls: 'breakdown' });
      for (const k of ['saleRate', 'margin', 'rights', 'region', 'rounds']) {
        const [label, max] = labels[k];
        const score = ratingResult.breakdown[k];
        const row = el('div', { cls: 'breakdown-row' });
        row.appendChild(el('span', { cls: 'b-label', text: label }));
        const bar = el('div', { cls: 'b-bar' });
        const fill = el('div', { cls: 'b-bar-fill' });
        fill.style.width = (score / max * 100).toFixed(0) + '%';
        bar.appendChild(fill);
        row.appendChild(bar);
        row.appendChild(el('span', { cls: 'b-score', text: `${score}/${max}` }));
        table.appendChild(row);
      }
      rateSec.appendChild(table);
      }
    }
    inner.appendChild(rateSec);

    // Notes
    if (c.notes) {
      const noteSec = section('메모', { key: 'notes' });
      noteSec.appendChild(el('div', { cls: 'value dim', text: c.notes }));
      inner.appendChild(noteSec);
    }

    // Source / trace
    const srcSec = section('출처·추적', { key: 'source' });
    const srcGrid = el('div', { cls: 'detail-grid' });
    srcGrid.appendChild(field('sourcing 세션', c.sourcingSession || '—'));
    srcGrid.appendChild(field('최초 추가', c.addedAt || '—'));
    srcGrid.appendChild(field('마지막 갱신', c.updatedAt || '—', { wide: true }));
    if (c.hauctionUrl) {
      const link = el('a', { cls: 'ext-link', text: c.hauctionUrl, attrs: { href: c.hauctionUrl, target: '_blank', rel: 'noopener' } });
      // hauctionUrl 필드명은 스키마 호환 위해 유지. 라벨은 실제 URL 호스트로 판별 (지지옥션 전환 2026-05-31)
      const srcLabel = /ggi\.co\.kr/.test(c.hauctionUrl) ? '지지옥션' : /hauction/.test(c.hauctionUrl) ? '행크옥션(구)' : '경매정보';
      srcGrid.appendChild(field(srcLabel, link, { wide: true }));
    }
    if (c.reportPath) srcGrid.appendChild(field('보고서', c.reportPath, { wide: true }));
    srcSec.appendChild(srcGrid);
    inner.appendChild(srcSec);

    // ===== 정보 계층 재배치 (v9.1) — 의사결정 → 근거 → 참고(접기) =====
    // header·banner는 그대로 최상단. 나머지를 우선순위 순으로 재정렬하고 저우선은 <details>로 수납.
    {
      const PRIMARY = ['profit', 'market'];                 // 의사결정 핵심
      const SECONDARY = ['result', 'pred', 'rights', 'numbers', 'report', 'reason']; // 근거
      const MORE = ['related', 'history', 'address', 'tags', 'rating', 'notes', 'source']; // 참고(접기)
      const pick = k => inner.querySelector(':scope > [data-sec="' + k + '"]');
      // 1) 핵심·근거를 순서대로 맨 끝으로 이동 (header·banner 뒤에 정렬됨)
      [...PRIMARY, ...SECONDARY].forEach(k => { const n = pick(k); if (n) inner.appendChild(n); });
      // 2) 참고 정보는 접이식으로 수납
      const present = MORE.map(pick).filter(Boolean);
      if (present.length) {
        const det = document.createElement('details');
        det.className = 'more-sections';
        const sm = document.createElement('summary');
        sm.textContent = '참고 정보 (단지 이력·같은 단지·태그·추천도 채점·출처)';
        det.appendChild(sm);
        present.forEach(n => det.appendChild(n));
        inner.appendChild(det);
      }
    }

    if (!opts || !opts.skipUrlSync) syncUrl();
    if (state.view === 'list') renderList();
    else renderCalendar();
  }

  function closeDetail() {
    state.selectedId = null;
    document.getElementById('detail-panel').classList.remove('open');
    document.getElementById('panel-backdrop').classList.remove('show'); // 모바일 backdrop 해제
    syncUrl();
    if (state.view === 'list') renderList();
    else renderCalendar();
  }

  function copyDeepLink(id, btn) {
    const url = window.location.origin + window.location.pathname + '?case=' + encodeURIComponent(id);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓ 복사됨';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      }).catch(() => { window.prompt('이 사건 링크:', url); });
    } else { window.prompt('이 사건 링크:', url); }
  }

  // ===== Events =====
  document.querySelectorAll('.tab').forEach((b) => {
    b.addEventListener('click', () => setView(b.dataset.view));
  });
  document.getElementById('prev-month').addEventListener('click', () => {
    state.currentMonth.m--;
    if (state.currentMonth.m < 0) { state.currentMonth.m = 11; state.currentMonth.y--; }
    renderCalendar();
  });
  document.getElementById('next-month').addEventListener('click', () => {
    state.currentMonth.m++;
    if (state.currentMonth.m > 11) { state.currentMonth.m = 0; state.currentMonth.y++; }
    renderCalendar();
  });
  document.getElementById('today-btn').addEventListener('click', () => {
    const d = new Date();
    state.currentMonth = { y: d.getFullYear(), m: d.getMonth() };
    renderCalendar();
  });
  // 결과 필터를 켰을 때 현재 달에 해당 결과가 없으면, 가장 최근 매칭 사건의 달로 자동 이동
  // (결과는 과거에 있는데 캘린더는 오늘=현재 달을 보고 있어 빈 화면이 되는 문제 해소)
  function ensureResultMonthVisible() {
    if (state.view !== 'calendar' || !state.filters.result) return;
    const matches = CASES.filter(passesFilter);
    if (!matches.length) return;
    const cm = state.currentMonth;
    const inCurrent = matches.some((c) => {
      if (!c.saleDate) return false;
      const d = new Date(c.saleDate + 'T00:00:00');
      return d.getFullYear() === cm.y && d.getMonth() === cm.m;
    });
    if (inCurrent) return;
    const dates = matches.map((c) => c.saleDate).filter(Boolean).sort();
    const latest = dates[dates.length - 1];
    if (latest) { const d = new Date(latest + 'T00:00:00'); state.currentMonth = { y: d.getFullYear(), m: d.getMonth() }; }
  }
  for (const f of ['region', 'priority', 'risk', 'rating', 'result']) {
    document.getElementById('f-' + f).addEventListener('change', (e) => {
      state.filters[f] = e.target.value;
      updateStats();
      if (f === 'result') ensureResultMonthVisible();
      if (state.view === 'list') renderList(); else renderCalendar();
    });
  }
  // Verdict multi-toggle — chip click flips hide/show for that verdict
  function syncVerdictToggleUI() {
    document.querySelectorAll('#f-verdict-toggles .vtog').forEach((btn) => {
      const v = btn.dataset.verdict;
      btn.classList.toggle('hidden', state.filters.verdictHidden.has(v));
    });
  }
  document.querySelectorAll('#f-verdict-toggles .vtog').forEach((btn) => {
    btn.addEventListener('click', () => {
      const v = btn.dataset.verdict;
      if (state.filters.verdictHidden.has(v)) state.filters.verdictHidden.delete(v);
      else state.filters.verdictHidden.add(v);
      saveVerdictHidden(state.filters.verdictHidden);
      syncVerdictToggleUI();
      updateStats();
      if (state.view === 'list') renderList(); else renderCalendar();
    });
  });
  syncVerdictToggleUI();
  let searchDebounce;
  document.getElementById('f-search').addEventListener('input', (e) => {
    const val = e.target.value.trim();
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      state.filters.search = val;
      updateStats();
      if (state.view === 'list') renderList(); else renderCalendar();
    }, 150);
  });
  document.getElementById('f-reset').addEventListener('click', () => {
    state.filters = { verdictHidden: new Set(['fail']), region: '', priority: '', risk: '', rating: '', search: '', result: '' };
    saveVerdictHidden(state.filters.verdictHidden);
    syncVerdictToggleUI();
    document.getElementById('f-region').value = '';
    document.getElementById('f-priority').value = '';
    document.getElementById('f-risk').value = '';
    document.getElementById('f-rating').value = '';
    document.getElementById('f-result').value = '';
    document.getElementById('f-search').value = '';
    updateStats();
    if (state.view === 'list') renderList(); else renderCalendar();
  });
  window.addEventListener('popstate', () => {
    applyUrl();
    setView(state.view);
    if (state.selectedId) openDetail(state.selectedId, { skipUrlSync: true });
    else closeDetail();
  });
  // 키보드 접근성 (a11y): ESC로 상세 패널 닫기
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && state.selectedId) {
      e.preventDefault();
      closeDetail();
    }
  });
  // 모바일: backdrop 탭하면 패널 닫기 (딥링크 갇힘 해소)
  document.getElementById('panel-backdrop').addEventListener('click', closeDetail);
  // 모바일: 필터 수납 토글
  (function () {
    const tg = document.getElementById('filter-toggle');
    const fl = document.getElementById('filters');
    if (!tg || !fl) return;
    tg.addEventListener('click', () => {
      const open = fl.classList.toggle('open');
      tg.setAttribute('aria-expanded', open ? 'true' : 'false');
      tg.textContent = open ? '🔍 필터 ▴' : '🔍 필터 ▾';
    });
  })();

  // ===== Resizable detail panel =====
  applyPanelWidth(loadPanelWidth());
  (function setupResize() {
    const handle = document.getElementById('resize-handle');
    const panel = document.getElementById('detail-panel');
    if (!handle || !panel) return;
    let dragging = false;
    let startX = 0;
    let startW = 0;
    let savedTransition = '';
    handle.addEventListener('pointerdown', (e) => {
      if (!panel.classList.contains('open')) return; // no-op when panel closed
      e.preventDefault();
      dragging = true;
      startX = e.clientX;
      startW = panel.getBoundingClientRect().width;
      savedTransition = panel.style.transition;
      panel.style.transition = 'none'; // smooth drag — no width animation
      handle.classList.add('dragging');
      document.body.classList.add('resizing');
      try { handle.setPointerCapture(e.pointerId); } catch (err) {}
    });
    handle.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = startX - e.clientX; // drag left → bigger panel
      const newW = clampPanelW(startW + dx);
      applyPanelWidth(newW);
    });
    function endDrag(e) {
      if (!dragging) return;
      dragging = false;
      handle.classList.remove('dragging');
      document.body.classList.remove('resizing');
      panel.style.transition = savedTransition;
      const finalW = Math.round(panel.getBoundingClientRect().width);
      savePanelWidth(finalW);
      if (e && e.pointerId != null) {
        try { handle.releasePointerCapture(e.pointerId); } catch (err) {}
      }
    }
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
    // Double-click handle → reset to default width
    handle.addEventListener('dblclick', () => {
      applyPanelWidth(460);
      savePanelWidth(460);
    });
    // Re-clamp on viewport resize so user can't get stuck wider than the window
    window.addEventListener('resize', () => {
      const cur = panel.getBoundingClientRect().width;
      const clamped = clampPanelW(cur);
      if (clamped !== cur) applyPanelWidth(clamped);
    });
  })();

  // ===== Init =====
  initRegionFilter();
  updateStats();
  applyUrl();
  setView(state.view);
  if (state.selectedId) openDetail(state.selectedId, { skipUrlSync: true });
  } // end main()

  // cases-loaded 이벤트로 진입 (cases.js 동적 로드 완료 시점)
  if (window.AUCTION_CASES && window.AUCTION_CASES.length) {
    main();
  } else {
    window.addEventListener('cases-loaded', main, { once: true });
  }
})();
</script>
</body>
</html>
